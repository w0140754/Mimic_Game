<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mimic Prototype V1</title>
  <style>
    :root {
      --bg: #111111;
      --panel: #1b1b1b;
      --text: #f2f2f2;
      --muted: #b8b8b8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    .wrap {
      display: grid;
      gap: 12px;
      justify-items: center;
      padding: 20px;
    }

    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 1px solid #2c2c2c;
      background: #000;
      max-width: min(90vw, 720px);
      width: 100%;
      height: auto;
      display: block;
    }

    .hud {
      width: min(90vw, 720px);
      background: var(--panel);
      border: 1px solid #2c2c2c;
      border-radius: 12px;
      padding: 12px 14px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .title {
      font-weight: 700;
    }

    .sub {
      color: var(--muted);
      font-size: 14px;
    }

    .pill {
      padding: 6px 10px;
      border-radius: 999px;
      background: #252525;
      border: 1px solid #333;
      font-size: 14px;
    }

    .canvas-shell {
      position: relative;
      width: min(90vw, 720px);
    }

	.item-bar {
	  position: absolute;
	  left: 50%;
	  top: 16px;
	  transform: translateX(-50%);
	  display: none;
	  gap: 6px;
	  padding: 4px;
	  border: 2px solid rgba(255,255,255,0.95);
	  background: rgba(0,0,0,0.65);
	  z-index: 5;
	  pointer-events: auto;
	}

    .item-bar.open {
      display: flex;
    }

    .item-slot {
      width: 52px;
      height: 52px;
      border: 2px solid rgba(255,255,255,0.95);
      background: rgba(0,0,0,0.85);
      padding: 0;
      display: grid;
      place-items: center;
      cursor: pointer;
    }

    .item-slot img {
      width: 40px;
      height: 40px;
      object-fit: contain;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      pointer-events: none;
    }

    .item-slot.empty {
      cursor: default;
    }

    .item-slot.selected {
      outline: 2px solid #ffd866;
      outline-offset: -4px;
      background: rgba(255,255,255,0.08);
    }



    .mobile-controls-frame {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      border: 0;
      background: transparent;
      z-index: 30;
      display: none;
      pointer-events: none;
    }

    @media (hover: none), (pointer: coarse), (max-width: 900px) {
      .mobile-controls-frame {
        display: block;
        pointer-events: auto;
      }
    }

    @media (hover: none), (pointer: coarse), (max-width: 900px) {
      html, body {
        width: 100%;
        height: 100%;
        min-height: 100dvh;
        overflow: hidden;
      }

      body {
        display: block;
      }

      .wrap {
        width: 100vw;
        height: 100dvh;
        padding: 0;
        gap: 0;
      }

      .canvas-shell {
        width: 100vw;
        height: 100dvh;
        display: grid;
        place-items: center;
      }

      canvas {
        width: min(100vw, calc(100dvh * 4 / 3));
        height: auto;
        max-width: 100vw;
        max-height: 100dvh;
        border: 0;
      }

      .hud {
        display: none;
      }

      .item-bar {
        top: max(8px, env(safe-area-inset-top));
        transform: translateX(-50%) scale(0.85);
        transform-origin: top center;
      }
    }

  </style>
</head>
<body>
  <div class="wrap">
    <div class="canvas-shell">
      <canvas id="game" width="480" height="360"></canvas>
      <div class="item-bar" id="itemBar">
        <button class="item-slot empty" data-equip="" aria-label="Empty hands"></button>
        <button class="item-slot" data-equip="dirt" aria-label="Hold dirt"><img src="./tiles/tile_dirt.png" alt="Dirt"></button>
        <button class="item-slot" data-equip="grass" aria-label="Hold grass"><img src="./tiles/tile_grass.png" alt="Grass"></button>
        <button class="item-slot" data-equip="water" aria-label="Hold water"><img src="./tiles/tile_water.png" alt="Water"></button>
        <button class="item-slot" data-equip="acorn" aria-label="Hold acorn"><img src="./acorn.png" alt="Acorn"></button>
        <div class="item-slot empty"></div>
        <div class="item-slot empty"></div>
        <div class="item-slot empty"></div>
        <div class="item-slot empty"></div>
        <div class="item-slot empty"></div>
      </div>
      <iframe id="mobileControlsFrame" class="mobile-controls-frame" src="./mobile_controls_v3.html" title="Mobile controls"></iframe>
    </div>
    <div class="hud">
      <div>
        <div class="title">Mimic Simulator</div>
        <div class="sub"></div>
      </div>
      <div class="pill" id="turnLabel">Turn: 0</div>
      <div class="pill" id="pos">Tile: 0, 0</div>
      <div class="pill" id="camInfo">Valid: 0 · Dirt: 0 · Grass: 0 · Water: 0 · Trees: 0 · Tree%: 0%</div>
      <div class="pill" id="slimeInfo">Slime: Not spawned</div>
      <div class="pill" id="acornCountLabel">Acorns: 0</div>
    </div>
  </div>

  <script>
    var TREE_GENERATION_CHUNK_SIZE = 16;
    var TREE_TERRAIN_INVALIDATION_CHANCE = 0.30;
    const LOOSE_ACORN_MAX_VISIBLE = 5;
    const LOOSE_ACORN_DROP_CHANCE = 0.35;
    const FOREST_TREE_MIN_COUNT = 15;
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    const posLabel = document.getElementById('pos');
    const turnLabel = document.getElementById('turnLabel');
    const acornCountLabel = document.getElementById('acornCountLabel');
    const camInfoLabel = document.getElementById('camInfo');
    const slimeInfoLabel = document.getElementById('slimeInfo');
    let worldTurn = 0;
    function setTurnLabel() {
      if (!turnLabel) return;
      turnLabel.textContent = `Turn: ${worldTurn}`;
    }
    function updateAcornCountLabel() {
      if (!acornCountLabel) return;
      acornCountLabel.textContent = `Acorns: ${player?.acornCount || 0}`;
    }

    function incrementWorldTurn() {
      worldTurn += 1;
      setTurnLabel();
    updateAcornCountLabel();
    }
    
    const ACORN_GROW_PULSES = 5;

    function isTileOccupiedForTreeGrowth(tileX, tileY) {
      // Player tile
      const px = Math.floor(player.x);
      const py = Math.floor(player.y);
      if (px === tileX && py === tileY) return true;

      // Chest tile (even if mounted, chest still exists)
      const cx = Math.floor(chestState.x);
      const cy = Math.floor(chestState.y);
      if (cx === tileX && cy === tileY) return true;

      // Monsters
      for (const monster of monsters) {
        const mx = Math.floor(monster.x);
        const my = Math.floor(monster.y);
        if (mx === tileX && my === tileY) return true;
      }
      return false;
    }

    function tryAmbientPlantedAcornGrowth(environmentNow, now = performance.now()) {
      if (player.form !== 'shadow') return false;
      if (!plantedAcorns.size) return false;

      let progressedAny = false;
      let grewAny = false;
      const activeTrees = getActiveTreeTiles(now);

      for (const [key, info] of [...plantedAcorns.entries()]) {
        const [x, y] = key.split(',').map(Number);

        // Only advance planted acorns that are still on valid base terrain.
        const base = tileAt(x, y);
        if (base !== 'dirt' && base !== 'grass') continue;

        const nextGrowthPulses = Math.max(0, (info?.growthPulses || 0)) + 1;
        info.growthPulses = nextGrowthPulses;
        progressedAny = true;

        if (nextGrowthPulses < ACORN_GROW_PULSES) continue;
        if (activeTrees.has(key)) continue;
        if (isTileOccupiedForTreeGrowth(x, y)) continue;

        treeState.set(key, { bornAt: environmentNow, variant: chooseTreeVariant() });
        plantedAcorns.delete(key);
        grewAny = true;
      }

      return grewAny;
    }
setTurnLabel();
    const itemBar = document.getElementById('itemBar');
    const itemButtons = [...document.querySelectorAll('.item-bar .item-slot[data-equip]')];
    const mobileControlsFrame = document.getElementById('mobileControlsFrame');
    const mobileInputState = { up: false, down: false, left: false, right: false };

    function isMobileViewportActive() {
      return window.matchMedia('(hover: none), (pointer: coarse), (max-width: 900px)').matches;
    }

    function getMobileInventoryState() {
      return [
        { equip: '', label: 'Empty', selected: !player.heldTile, disabled: false, icon: null },
        { equip: 'dirt', label: 'Dirt', selected: player.heldTile === 'dirt', disabled: false, icon: './tiles/tile_dirt.png' },
        { equip: 'grass', label: 'Grass', selected: player.heldTile === 'grass', disabled: false, icon: './tiles/tile_grass.png' },
        { equip: 'water', label: 'Water', selected: player.heldTile === 'water', disabled: false, icon: './tiles/tile_water.png' },
        { equip: 'acorn', label: `Acorn (${player?.acornCount || 0})`, selected: player.heldTile === 'acorn', disabled: (player?.acornCount || 0) <= 0, icon: './acorn.png' },
      ];
    }

    function isMobileMenuNavigable() {
      return !!(player.form === 'chest' && mountedMenu.open && (
        mountedMenu.mode === 'menu'
        || mountedMenu.mode === 'ambush_select'
        || mountedMenu.mode === 'target_select'
      ));
    }

    function postMobileControlsState() {
      if (!mobileControlsFrame || !mobileControlsFrame.contentWindow) return;
      mobileControlsFrame.contentWindow.postMessage({
        type: 'game-state',
        mobileEnabled: isMobileViewportActive(),
        inventoryOpen: isItemBarOpen(),
        menuOpen: isMobileMenuNavigable(),
        inventory: getMobileInventoryState(),
      }, '*');
    }

    function setMobileMovementState(nextState = {}) {
      const desired = {
        up: !!nextState.up,
        down: !!nextState.down,
        left: !!nextState.left,
        right: !!nextState.right,
      };

      if (player.form === 'chest') {
        const vertical = (desired.down ? 1 : 0) - (desired.up ? 1 : 0);
        const horizontal = (desired.right ? 1 : 0) - (desired.left ? 1 : 0);
        if (Math.abs(horizontal) >= Math.abs(vertical)) {
          desired.up = false;
          desired.down = false;
          if (horizontal > 0) { desired.right = true; desired.left = false; }
          else if (horizontal < 0) { desired.left = true; desired.right = false; }
          else { desired.left = false; desired.right = false; }
        } else {
          desired.left = false;
          desired.right = false;
          if (vertical > 0) { desired.down = true; desired.up = false; }
          else if (vertical < 0) { desired.up = true; desired.down = false; }
          else { desired.up = false; desired.down = false; }
        }
      }

      const keyMap = { up: 'arrowup', down: 'arrowdown', left: 'arrowleft', right: 'arrowright' };
      for (const dir of ['up', 'down', 'left', 'right']) {
        if (mobileInputState[dir] === desired[dir]) continue;
        mobileInputState[dir] = desired[dir];
        setMovementKey(keyMap[dir], desired[dir]);
      }
    }

    function clearMobileMovementState() {
      setMobileMovementState({ up: false, down: false, left: false, right: false });
    }


    const TILE_SIZE = 64;
    const EDGE_HEIGHT = 32;
    const PLAYER_DRAW_OFFSET_Y = 0;
    const SHADOW_SPEED = 2.0;
    const CHEST_SPEED = 2;
    const RECALL_CHARGE_MS = 2500;
    const CHEST_POSSESS_MS = 340;
    const CHEST_POSSESS_SHADOW_FADE_MS = 180;
    const CHEST_POSSESS_CHEST_DELAY_MS = 70;
    const CHEST_POSSESS_CHEST_FADE_MS = 170;
    const CHEST_RELEASE_MS = 360;
    const CHEST_RELEASE_SHADOW_DELAY_MS = 90;
    const CHEST_RELEASE_SHADOW_FADE_MS = 190;
    const CHEST_RELEASE_CHEST_FADE_MS = 170;
    const CHEST_MOUNTED_ANIM_FRAMES = 2;
    const CHEST_MOUNTED_FRAME_MS = 280;

    const world = new Map();
    const generatedTreeChunks = new Set();
    const grassVariants = new Map();
    const treeState = new Map();
    const choppedTrees = new Map();
    const removingTrees = new Map();
    const tilePlacementState = new Map();
    const plantedAcorns = new Map();
    const looseAcorns = new Map();
    const collectedAcornEffects = new Map();

    const movementReleaseGate = { up: false, down: false, left: false, right: false };

    const chestPossessTransition = {
      active: false,
      startedAt: 0,
      duration: CHEST_POSSESS_MS,
      shadowX: 0,
      shadowY: 0,
      chestX: 0,
      chestY: 0
    };

    const chestReleaseTransition = {
      active: false,
      startedAt: 0,
      duration: CHEST_RELEASE_MS,
      shadowStartX: 0,
      shadowStartY: 0,
      shadowEndX: 0,
      shadowEndY: 0,
      chestX: 0,
      chestY: 0
    };

    function keyOf(x, y) {
      return `${x},${y}`;
    }

    function chooseGrassVariant() {
      return Math.random() < 0.5 ? 'a' : 'b';
    }

    function chooseTreeVariant() {
      return Math.random() < 0.5 ? 'a' : 'b';
    }

    function setTile(x, y, type, animate = true, now = performance.now()) {
      const key = keyOf(x, y);
      world.set(key, type);
      if (type === 'grass') {
        if (!grassVariants.has(key)) grassVariants.set(key, chooseGrassVariant());
      } else {
        grassVariants.delete(key);
      }
      invalidateTreeGenerationAround(x, y);
      if (animate) {
        tilePlacementState.set(key, { bornAt: now });
      } else {
        tilePlacementState.delete(key);
      }
    }

    function tileAt(x, y) {
      return world.get(keyOf(x, y)) || null;
    }

    function hasTile(x, y) {
      return world.has(keyOf(x, y));
    }

	for (let y = -1; y <= 1; y++) {
	  for (let x = -1; x <= 1; x++) {
		setTile(x, y, 'dirt', false);
	  }
	}

    const PLAYER_RADIUS = 0.22;
    const TREE_MAX_RATIO = 0.20;
    const FOREST_TREE_MAX_RATIO = 0.60;
    const TREE_AMBIENT_GROWTH_CHECK_MS = 1000;
    const TREE_AMBIENT_GROWTH_CHANCE = 0.05;
    const TREE_AMBIENT_GROWTH_MAX_ADDITIONS = 1;
    const TREE_SIMULATION_MARGIN = 4;    const TREE_GROW_MS = 320;
    const TREE_FADE_MS = 180;
    const TREE_REGROW_MS = 60000;
    const LOOSE_ACORN_LIFETIME_MS = 30000;
    const LOOSE_ACORN_FADE_OUT_MS = 3000;
    const TILE_PLACE_MS = 180;
    const SPAWN_BLOCK_RADIUS = 0.49;
    const SHADOW_IDLE_FRAMES = 2;
    const SHADOW_IDLE_FRAME_MS = 300;
    const SHADOW_WALK_FRAMES = 6;
    const SHADOW_WALK_FRAME_MS = 90;

    const GREEN_SLIME_FRAMES = 3;
    const GREEN_SLIME_FRAME_MS = 180;
    const GREEN_SLIME_IDLE_FRAME = 0;
    const GREEN_SLIME_SPEED = 0.8;
    const GREEN_SLIME_WANDER_RADIUS = 6;
    const GREEN_SLIME_INTERACT_RANGE = 0.7;
    const CHEST_INTERACT_RANGE = 0.5;
    const GREEN_SLIME_ALERT_MS = 1400;
    const FOREST_SLIME_SPAWN_CHANCE = 0.10;
    const HERO_WANDERER_SPEED = 1.0;
    const HERO_WANDERER_FLEE_SPEED = 2.4;
    const HERO_WANDERER_INTERACT_RANGE = 0.9;
    const HERO_SPAWN_CHANCE_ON_MOUNTED_MOVE = 0.06;
    const ENCOUNTER_BANNER_MS = 1600;
    const HERO_ALERT_MS = 350;
    const TURN_MENU_OPTION_LABELS = ['Move', 'Action', 'Wait'];
    const MOUNTED_MENU_OPTION_LABELS = ['Action', 'Wait', 'Dismount'];
    const HERO_BITE_DAMAGE = 3;
    const HERO_SURPRISE_BITE_DAMAGE = 5;
    const HERO_AMBUSH_ATTACKS = [{ label: 'Bite', baseDamage: HERO_BITE_DAMAGE }];

    function isHeroChestAttackSurprise(targetX, targetY, hero = null) {
      if (!player.hiddenInChest) return false;
      const chestTile = getCurrentChestTile();
      return Math.abs(targetX - chestTile.x) + Math.abs(targetY - chestTile.y) === 1;
    }

    function getHeroAttackDamage(attack, targetX, targetY, hero = null) {
      if (hero && isHeroChestAttackSurprise(targetX, targetY, hero)) {
        return HERO_SURPRISE_BITE_DAMAGE;
      }
      return attack?.baseDamage ?? HERO_BITE_DAMAGE;
    }

    function getHeroActionOptions() {
      const hidden = isChestHidden();
      const surpriseMenuActive = mountedMenu.open && mountedMenu.mode === 'ambush_select' && isHeroEngagementActive() && !!heroEngagement.ambushOpening;
      const actions = [];
      if (surpriseMenuActive) {
        actions.push({ label: 'Reveal', kind: 'reveal', disabled: false });
        actions.push(...HERO_AMBUSH_ATTACKS.map((attack) => ({ ...attack, kind: 'attack', disabled: false })));
        return actions;
      }
      actions.push({ label: hidden ? 'Reveal' : 'Hide', kind: hidden ? 'reveal' : 'hide', disabled: false });
      actions.push(...HERO_AMBUSH_ATTACKS.map((attack) => ({ ...attack, kind: 'attack', disabled: hidden })));
      return actions;
    }
    const AMBUSH_DIE_ROLL_DURATION = 650;
    const AMBUSH_DIE_FACE_INTERVAL = 85;
    const HERO_CAMERA_PAN_SPEED = 8.0;
    const ENGAGEMENT_FADE_MS = 220;

    const player = {
      x: 0.5,
      y: 0.5,
      form: 'shadow',
      heldTile: null,
      facing: 'down',
      facingX: 1,
      moving: false,
      animTime: 0,
      ghostChargeStartAt: null,
      selectedTreeKey: null,
      acornCount: 0,
      chestMoveTargetX: null,
      chestMoveTargetY: null,
      chestMoveStartX: null,
      chestMoveStartY: null,
      hiddenInChest: false,
    };

    const chestState = {
      placed: true,
      x: 0.5,
      y: -0.5,
    };

    const camera = {
      x: 0,
      y: 0,
    };

    const monsters = [];
    let nextAmbientTreeGrowthCheckAt = performance.now() + TREE_AMBIENT_GROWTH_CHECK_MS;
    let encounterBannerText = '';
    let encounterBannerUntil = 0;
    let encounterBannerTimeout = null;
    const heroEngagement = {
      active: false,
      hero: null,
      turn: 'player',
      menuOpen: false,
      menuIndex: 0,
      playerMoveUsed: false,
      playerActionUsed: false,
      mode: 'idle',
      pendingPlayerStep: null,
      transition: null,
      cameraOffsetX: 0,
      cameraOffsetY: 0,
      bannerAction: null,
      bannerStartedAt: 0,
      ambushMenuIndex: 0,
      ambushAttack: null,
      ambushRoll: null,
      ambushTotalDamage: null,
      ambushResultText: '',
      ambushOutcome: null,
      ambushDieFace: 1,
      ambushDieRolling: false,
      ambushDieRollStartedAt: 0,
      ambushPendingRoll: null,
      targetCursorX: 0,
      targetCursorY: 0,
      ambushTargetX: null,
      ambushTargetY: null,
      ambushOpening: false,
    };

    const mountedMenu = {
      open: false,
      mode: 'menu',
      menuIndex: 0,
      ambushMenuIndex: 0,
      ambushAttack: null,
      ambushRoll: null,
      ambushTotalDamage: null,
      ambushResultText: '',
      ambushOutcome: null,
      ambushDieFace: 1,
      ambushDieRolling: false,
      ambushDieRollStartedAt: 0,
      ambushPendingRoll: null,
      targetCursorX: 0,
      targetCursorY: 0,
      ambushTargetX: null,
      ambushTargetY: null,
      ambushResultUntil: 0,
    };

    const FLOATING_TEXT_MS = 850;
    const floatingTexts = [];

    const directionOrder = [
      { dx: 0, dy: -1, name: 'North' },
      { dx: 1, dy: 0, name: 'East' },
      { dx: 0, dy: 1, name: 'South' },

    ];

    const input = {
      up: false,
      down: false,

      space: false,
    };

    const assets = {
      grass: new Image(),
      grassB: new Image(),
      dirt: new Image(),
      water: new Image(),
      waterEdge: new Image(),

      dirtEdge: new Image(),
      tree: new Image(),

      greenSlime: new Image(),

      acorn: new Image(),
      acornPlanted: new Image(),
	  chest: new Image(),
	  chestMounted: new Image(),
	  chestMountedAnim: new Image(),
	  chestOpen: new Image(),
	  chestBiteAnim: new Image(),
    };

	const loaded = {
	  grass: false,
	  grassB: false,
	  dirt: false,
	  water: false,
	  waterEdge: false,
	  grassEdge: false,
	  dirtEdge: false,
	  tree: false,
	  treeB: false,
	  shadow: false,
	  shadowIdleAnim: false,
	  shadowWalk: false,
	  greenSlime: false,
      heroWanderer: false,
      acorn: false,
      acornPlanted: false,
	  chest: false,
	  chestMounted: false,
	  chestMountedAnim: false,
	  chestOpen: false,
	  chestBiteAnim: false,
	};

    const playerSpriteCanvas = document.createElement('canvas');
    playerSpriteCanvas.width = TILE_SIZE;
    playerSpriteCanvas.height = TILE_SIZE;
    const playerSpriteCtx = playerSpriteCanvas.getContext('2d');
    playerSpriteCtx.imageSmoothingEnabled = false;

    const shadowSpriteCanvas = document.createElement('canvas');
    shadowSpriteCanvas.width = TILE_SIZE;
    shadowSpriteCanvas.height = TILE_SIZE;
    const shadowSpriteCtx = shadowSpriteCanvas.getContext('2d');
    shadowSpriteCtx.imageSmoothingEnabled = false;

    function rebuildPlayerSprite() {
      const c = playerSpriteCtx;
      c.clearRect(0, 0, TILE_SIZE, TILE_SIZE);
      c.fillStyle = '#7a4a21';
      c.fillRect(16, 20, 32, 24);
      c.fillStyle = '#c9963b';
      c.fillRect(16, 16, 32, 8);
      c.fillStyle = '#f0d46b';
      c.fillRect(29, 26, 6, 8);
      c.strokeStyle = '#3a220e';
      c.lineWidth = 2;
      c.strokeRect(16, 20, 32, 24);
      c.strokeRect(16, 16, 32, 8);
    }

    function rebuildShadowSprite() {
      const c = shadowSpriteCtx;
      c.clearRect(0, 0, TILE_SIZE, TILE_SIZE);
      c.fillStyle = '#09080f';
      c.beginPath();
      c.ellipse(32, 24, 11, 13, 0, 0, Math.PI * 2);
      c.fill();
      c.beginPath();
      c.ellipse(24, 36, 6, 10, -0.35, 0, Math.PI * 2);
      c.fill();
      c.beginPath();

    rebuildPlayerSprite();

    const WATER_TOP_FRAMES = 4;

    function drawAnimatedStripFrame(img, frameCount, frameIndex, screenX, screenY, drawW, drawH) {
      const frameW = img.width / frameCount;
      const sx = Math.floor(frameW * frameIndex);

    function getPlayerTile() {
      return {
        x: Math.floor(player.x),

      };

    function getCurrentChestPosition() {
      if (player.form === 'chest') {
        return { x: player.x, y: player.y };

      return { x: chestState.x, y: chestState.y };
    }

    function getCurrentChestTile() {
      const chestPos = getCurrentChestPosition();
      return {
        x: Math.floor(chestPos.x),

      };

    function getPlayerPixelPosition(now = performance.now()) {
      if (chestReleaseTransition.active) {
        const releaseState = getChestReleaseVisualState(now);
        return {
          x: releaseState.shadowDrawX * TILE_SIZE,
          y: releaseState.shadowDrawY * TILE_SIZE,
        };
      }
      return {
        x: player.x * TILE_SIZE,
        y: player.y * TILE_SIZE,
      };

    function updateCamera() {
      const playerPx = getPlayerPixelPosition();
      let offsetX = 0;
      let offsetY = 0;
      if (isHeroEngagementActive() && heroEngagement.mode === 'camera') {
        offsetX = heroEngagement.cameraOffsetX * TILE_SIZE;
        offsetY = heroEngagement.cameraOffsetY * TILE_SIZE;
      }
      camera.x = Math.floor(canvas.width / 2 - playerPx.x - offsetX);
      camera.y = Math.floor(canvas.height / 2 - playerPx.y - EDGE_HEIGHT / 2 - offsetY);
    }

    function getFacingDirection() {
      const dir = directionOrder.find((d) => d.name.toLowerCase() === player.facing);
      return dir || directionOrder[2];
    }

    function getFacingTile() {
      const tile = getPlayerTile();
      const dir = getFacingDirection();
      return {
        x: tile.x + dir.dx,
        y: tile.y + dir.dy,
      };
    }

    function getActiveTreeTiles(now = performance.now()) {
      if (pausedTreeTiles) return new Set(pausedTreeTiles);
      const active = new Set();
      for (const [key] of treeState) {
        if (removingTrees.has(key)) continue;
        active.add(key);
      }
      return active;
    }

    function isFacingTree(now = performance.now()) {
      const target = getFacingTile();
      return getActiveTreeTiles(now).has(keyOf(target.x, target.y));
    }

    function getFacingTreeTarget(now = performance.now()) {
      if (player.form !== 'shadow') return null;
      const target = getFacingTile();
      const key = keyOf(target.x, target.y);
      if (!getActiveTreeTiles(now).has(key)) return null;
      return { x: target.x, y: target.y, key };
    }

    function clearSelectedTree() {
      player.selectedTreeKey = null;
    }

    function refreshSelectedTree(now = performance.now()) {
      if (!player.selectedTreeKey) return;
      const facingTree = getFacingTreeTarget(now);
      if (!facingTree || facingTree.key !== player.selectedTreeKey) {
        clearSelectedTree();
      }
    }

    function chopTreeAt(x, y, now = performance.now()) {
      const environmentNow = getEnvironmentNow(now);
      const key = keyOf(x, y);
      removingTrees.set(key, { startedAt: environmentNow, variant: treeState.get(key)?.variant || chooseTreeVariant() });
      treeState.delete(key);
      if (player.selectedTreeKey === key) clearSelectedTree();
      return true;
    }

    function removeTreeImmediately(x, y) {
      const key = keyOf(x, y);
      let removed = false;
      if (treeState.delete(key)) removed = true;
      if (removingTrees.delete(key)) removed = true;
      if (pausedTreeTiles && pausedTreeTiles.delete(key)) removed = true;
      if (player.selectedTreeKey === key) clearSelectedTree();
      return removed;
    }

    function getHeldTileTarget() {
      if (player.form !== 'shadow' || !player.heldTile || player.heldTile === 'acorn') return null;
      const tile = getPlayerTile();
      const dir = getFacingDirection();
      const tx = tile.x + dir.dx;
      const ty = tile.y + dir.dy;
      if (hasTile(tx, ty)) return null;
      return { x: tx, y: ty, name: dir.name };
    }

    function placeHeldTile() {
      const target = getHeldTileTarget();
      if (!target) return false;
      setTile(target.x, target.y, player.heldTile, true, performance.now());
      render();
      return true;
    }

    function hasPlantedAcornAt(x, y) {
      return plantedAcorns.has(keyOf(x, y));
    }

    function getAcornPlantTarget(now = performance.now()) {
      if (player.form !== 'shadow' || player.heldTile !== 'acorn') return null;
      const target = getFacingTile();
      const baseTile = tileAt(target.x, target.y);
      if (baseTile !== 'dirt' && baseTile !== 'grass') return null;
      if (hasPlantedAcornAt(target.x, target.y)) return null;
      // Don't allow planting where a tree currently exists.
      if (getActiveTreeTiles(now).has(keyOf(target.x, target.y))) return null;
      return { x: target.x, y: target.y };
    }

    function plantAcornAt(x, y, now = performance.now()) {
      if ((player.acornCount || 0) <= 0) return false;
      if (tileAt(x, y) !== 'dirt' && tileAt(x, y) !== 'grass') return false;
      const key = keyOf(x, y);
      if (plantedAcorns.has(key)) return false;
      plantedAcorns.set(key, { plantedAt: now, growthPulses: 0 });
      player.acornCount = Math.max(0, (player.acornCount || 0) - 1);
      if (player.acornCount <= 0 && player.heldTile === 'acorn') player.heldTile = null;
      syncItemBarUi();
      render(now);
      return true;
    }


    function isLooseAcornBlockedAt(x, y) {
      if (tileAt(x, y) !== 'dirt' && tileAt(x, y) !== 'grass') return true;
      if (plantedAcorns.has(keyOf(x, y))) return true;
      if (getActiveTreeTiles(performance.now()).has(keyOf(x, y))) return true;
      if (isTileOccupiedForTreeGrowth(x, y)) return true;
      return false;
    }

    function getVisibleLooseAcornCount(bounds = getVisibleBounds()) {
      let count = 0;
      for (const key of looseAcorns.keys()) {
        const [x, y] = key.split(',').map(Number);
        if (isWithinBounds(x, y, bounds)) count++;
      }
      return count;
    }

    function getAdjacentAcornDropCandidates(treeX, treeY) {
      const dirs = [
        { dx: 0, dy: -1 },
        { dx: 1, dy: 0 },
        { dx: 0, dy: 1 },
        { dx: -1, dy: 0 },
      ];
      const out = [];
      for (const dir of dirs) {
        const x = treeX + dir.dx;
        const y = treeY + dir.dy;
        const key = keyOf(x, y);
        if (looseAcorns.has(key)) continue;
        if (isLooseAcornBlockedAt(x, y)) continue;
        out.push({ x, y, key, score: treeScore(x + 17, y - 29) });
      }
      out.sort((a, b) => a.score - b.score || a.y - b.y || a.x - b.x);
      return out;
    }

    function tryAmbientAcornDrop(now = performance.now(), treeTiles = getActiveTreeTiles(now), visibleBounds = getVisibleBounds()) {
      if (getVisibleLooseAcornCount(visibleBounds) >= LOOSE_ACORN_MAX_VISIBLE) return false;
      const eligibleTrees = [];
      for (const key of treeTiles) {
        const [x, y] = key.split(',').map(Number);
        if (!isWithinBounds(x, y, visibleBounds)) continue;
        const candidates = getAdjacentAcornDropCandidates(x, y);
        if (!candidates.length) continue;
        eligibleTrees.push({ x, y, key, candidates });
      }
      if (!eligibleTrees.length) return false;

      const tree = eligibleTrees[Math.floor(Math.random() * eligibleTrees.length)];
      const candidates = tree.candidates;
      const chosen = candidates[Math.floor(Math.random() * candidates.length)];
      looseAcorns.set(chosen.key, { bornAt: now, sourceTreeKey: tree.key });
      return true;
    }

    function getLooseAcornPickupTarget() {
      if (player.form !== 'shadow') return null;
      const target = getFacingTile();
      const key = keyOf(target.x, target.y);
      if (!looseAcorns.has(key)) return null;
      return { x: target.x, y: target.y, key };
    }

    function collectLooseAcornAt(x, y, now = performance.now()) {
      const key = keyOf(x, y);
      const info = looseAcorns.get(key);
      if (!info) return false;
      looseAcorns.delete(key);
      collectedAcornEffects.set(`${key}:${now}`, {
        x, y,
        sourceTreeKey: info?.sourceTreeKey || key,
        startedAt: now,
        lastUpdatedAt: now,
        currentX: null,
        currentY: null,
        baseW: 32,
        baseH: 32
      });
      player.acornCount = (player.acornCount || 0) + 1;
      syncItemBarUi();
      render(now);
      return true;
    }

    function collectLooseAcornUnderPlayer(now = performance.now()) {
      if (player.form !== 'shadow') return false;
      const playerTile = getPlayerTile();
      return collectLooseAcornAt(playerTile.x, playerTile.y, now);
    }

    function cleanupExpiredLooseAcorns(now = performance.now()) {
      if (!looseAcorns.size) return;
      for (const [key, info] of looseAcorns.entries()) {
        const bornAt = info?.bornAt || now;
        if ((now - bornAt) >= LOOSE_ACORN_LIFETIME_MS) {
          looseAcorns.delete(key);
        }
      }
    }

    function updateCollectedAcornEffects(now = performance.now()) {
      if (!collectedAcornEffects.size) return;
      const duration = 380;
      for (const [key, effect] of collectedAcornEffects.entries()) {
        const startedAt = effect?.startedAt || now;
        const elapsed = now - startedAt;
        if (elapsed >= duration) {
          collectedAcornEffects.delete(key);
          continue;
        }

        const landing = getLooseAcornLandingDrawState(effect.x, effect.y, effect, now);
        effect.baseW = landing.drawW;
        effect.baseH = landing.drawH;

        if (effect.currentX == null || effect.currentY == null) {
          effect.currentX = landing.finalX;
          effect.currentY = landing.baseFinalY;
        }

        const playerPx = getPlayerPixelPosition(now);
        const playerBaseScreenX = camera.x + playerPx.x - TILE_SIZE * 0.5;
        const playerBaseScreenY = camera.y + playerPx.y - TILE_SIZE * 0.5 + PLAYER_DRAW_OFFSET_Y;
        const playerDrawScale = 0.5;
        const playerDrawW = Math.floor(TILE_SIZE * playerDrawScale);
        const playerDrawH = Math.floor(TILE_SIZE * playerDrawScale);
        const playerDrawX = playerBaseScreenX + Math.floor((TILE_SIZE - playerDrawW) / 2);
        const playerDrawY = playerBaseScreenY - 5 + Math.floor((TILE_SIZE - playerDrawH) / 2);
        const targetX = playerDrawX + playerDrawW * 0.5 - landing.drawW * 0.5;
        const targetY = playerDrawY + playerDrawH * 0.5 - landing.drawH * 0.5;

        const lastUpdatedAt = effect?.lastUpdatedAt || startedAt;
        const dtMs = Math.max(0, Math.min(34, now - lastUpdatedAt));
        const remaining = Math.max(1, duration - elapsed);
        const homing = Math.min(1, (dtMs / remaining) * 1.65);
        effect.currentX += (targetX - effect.currentX) * homing;
        effect.currentY += (targetY - effect.currentY) * homing;
        effect.lastUpdatedAt = now;
      }
    }

    function tryChopTree(now = performance.now()) {
      if (player.form !== 'shadow') return false;
      const target = getFacingTile();
      const key = keyOf(target.x, target.y);
      if (!getActiveTreeTiles(now).has(key)) return false;
      chopTreeAt(target.x, target.y, now);

      return true;

    function getTilePlacementProgress(tileKey, now) {
      const state = tilePlacementState.get(tileKey);
      if (!state) return 1;
      const progress = Math.max(0, Math.min(1, (now - state.bornAt) / TILE_PLACE_MS));
      if (progress >= 1) tilePlacementState.delete(tileKey);
      return progress;
    }

    function getTilePlacementAnimState(progress) {
      const eased = 1 - Math.pow(1 - progress, 3);
      const pop = Math.sin(progress * Math.PI) * 0.06;
      const scale = 0.9 + eased * 0.1 + pop;
      return {
        alpha: 0.55 + eased * 0.45,
        scaleX: scale,
        scaleY: scale,
        yOffset: Math.round((1 - eased) * 10),
      };
    }

    function drawPlacedTopLayer(drawFn, screenX, screenY, progress) {
      if (progress >= 1) {
        drawFn(screenX, screenY, TILE_SIZE, TILE_SIZE);
        return;
      }
      const anim = getTilePlacementAnimState(progress);
      const drawW = Math.round(TILE_SIZE * anim.scaleX);
      const drawH = Math.round(TILE_SIZE * anim.scaleY);
      const drawX = screenX + Math.round((TILE_SIZE - drawW) / 2);
      const drawY = screenY + TILE_SIZE - drawH + anim.yOffset;
      ctx.save();
      ctx.globalAlpha = anim.alpha;
      drawFn(drawX, drawY, drawW, drawH);
      ctx.restore();
    }

    function drawPlacedEdgeLayer(drawFn, screenX, screenY, progress) {
      const edgeY = screenY + TILE_SIZE;
      if (progress >= 1) {
        drawFn(screenX, edgeY, TILE_SIZE, EDGE_HEIGHT);
        return;
      }
      const anim = getTilePlacementAnimState(progress);
      const fullH = TILE_SIZE + EDGE_HEIGHT;
      const drawW = Math.round(TILE_SIZE * anim.scaleX);
      const drawH = Math.round(EDGE_HEIGHT * anim.scaleY);
      const fullScaledH = Math.round(fullH * anim.scaleY);
      const drawX = screenX + Math.round((TILE_SIZE - drawW) / 2);
      const fullTop = screenY + fullH - fullScaledH + anim.yOffset;
      const drawY = fullTop + Math.round(TILE_SIZE * anim.scaleY);
      ctx.save();
      ctx.globalAlpha = anim.alpha;
      drawFn(drawX, drawY, drawW, drawH);
      ctx.restore();
    }

    function drawTileTop(type, tileX, tileY, screenX, screenY, now, progress = 1) {
      if (type === 'grass') {
        const grassVariant = grassVariants.get(keyOf(tileX, tileY)) || 'a';
        const grassImage = grassVariant === 'b' && loaded.grassB ? assets.grassB : assets.grass;
        return drawPlacedTopLayer((dx, dy, dw, dh) => {
          if ((grassVariant === 'b' && loaded.grassB) || loaded.grass) {
            ctx.drawImage(grassImage, dx, dy, dw, dh);
            return;
          }
          ctx.fillStyle = '#7edc7d';
          ctx.fillRect(dx, dy, dw, dh);
        }, screenX, screenY, progress);
      }

      if (type === 'water') {
        return drawPlacedTopLayer((dx, dy, dw, dh) => {
          if (loaded.water) {
            drawAnimatedStripFrame(assets.water, WATER_TOP_FRAMES, getWaterTopFrame(now), dx, dy, dw, dh);
            return;
          }
          ctx.fillStyle = '#6cd9e6';
          ctx.fillRect(dx, dy, dw, dh);
          ctx.fillStyle = 'rgba(255,255,255,0.25)';
          ctx.fillRect(dx + Math.round(dw * 0.125), dy + Math.round(dh * 0.16), Math.round(dw * 0.34), Math.max(2, Math.round(dh * 0.08)));
        }, screenX, screenY, progress);
      }

      if (type === 'dirt') {
        return drawPlacedTopLayer((dx, dy, dw, dh) => {
          if (loaded.dirt) {
            ctx.drawImage(assets.dirt, dx, dy, dw, dh);
            return;
          }
          ctx.fillStyle = '#8b5a3c';
          ctx.fillRect(dx, dy, dw, dh);
          ctx.fillStyle = '#6b422d';
          for (let i = 0; i < 5; i++) {
            ctx.fillRect(dx + Math.round(dw * 0.1) + i * Math.round(dw * 0.17), dy + Math.round(dh * (0.28 + (i % 2) * 0.18)), Math.max(2, Math.round(dw * 0.06)), Math.max(2, Math.round(dh * 0.06)));
          }
        }, screenX, screenY, progress);
      }
    }

    function drawTileEdge(type, screenX, screenY, now, progress = 1) {
      if (type === 'grass') {
        return drawPlacedEdgeLayer((dx, dy, dw, dh) => {
          if (loaded.grassEdge) {
            ctx.drawImage(assets.grassEdge, dx, dy, dw, dh);
            return;
          }
          ctx.fillStyle = '#8b5a3c';
          ctx.fillRect(dx, dy, dw, dh);
        }, screenX, screenY, progress);
      }

      if (type === 'water') {
        return drawPlacedEdgeLayer((dx, dy, dw, dh) => {
          if (loaded.waterEdge) {
            drawAnimatedStripFrame(assets.waterEdge, WATER_EDGE_FRAMES, getWaterEdgeFrame(now), dx, dy, dw, dh);
            return;
          }
          ctx.fillStyle = '#4caab4';
          ctx.fillRect(dx, dy, dw, dh);
        }, screenX, screenY, progress);
      }

      if (type === 'dirt') {
        return drawPlacedEdgeLayer((dx, dy, dw, dh) => {
          if (loaded.dirtEdge) {
            ctx.drawImage(assets.dirtEdge, dx, dy, dw, dh);
            return;
          }
          ctx.fillStyle = '#6b422d';
          ctx.fillRect(dx, dy, dw, dh);
        }, screenX, screenY, progress);
      }
    }

    function drawPlantedAcorns(bounds, now = performance.now()) {
      if (!plantedAcorns.size) return;

      for (let y = bounds.minY; y <= bounds.maxY; y++) {
        for (let x = bounds.minX; x <= bounds.maxX; x++) {
          const key = keyOf(x, y);
          if (!plantedAcorns.has(key)) continue;
          const base = tileAt(x, y);
          if (base !== 'dirt' && base !== 'grass') continue;

          const screenX = camera.x + x * TILE_SIZE;
          const screenY = camera.y + y * TILE_SIZE;

          const drawScale = 0.40;
          const drawW = Math.floor(TILE_SIZE * drawScale);
          const drawH = Math.floor(TILE_SIZE * drawScale);
          const drawX = Math.floor(screenX + (TILE_SIZE - drawW) / 2);
          const drawY = Math.floor(screenY + TILE_SIZE - drawH - 10);

          if (loaded.acornPlanted) {
            ctx.drawImage(assets.acornPlanted, drawX, drawY, drawW, drawH);
          } else {
            ctx.save();
            ctx.fillStyle = 'rgba(210, 170, 90, 0.95)';
            ctx.beginPath();
            ctx.ellipse(drawX + drawW / 2, drawY + drawH / 2, drawW * 0.35, drawH * 0.45, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          }
        }
      }
    }


    function drawLooseAcorns(bounds, now = performance.now()) {
      if (!looseAcorns.size) return;
      const groundBob = Math.sin(now / 220) * 1.5;
      const fallDuration = 520;
      for (const [key, info] of looseAcorns.entries()) {
        const [x, y] = key.split(',').map(Number);
        if (!isWithinBounds(x, y, bounds)) continue;
        const landing = getLooseAcornLandingDrawState(x, y, info, now);
        const drawW = landing.drawW;
        const drawH = landing.drawH;
        const sourceKey = landing.sourceKey;
        const treeX = landing.treeX;
        const treeY = landing.treeY;
        const finalX = landing.finalX;
        const baseFinalY = landing.baseFinalY;

        let drawX = finalX;
        let drawY = baseFinalY + groundBob;
        let alpha = 1;
        let shadowAlphaMul = 1;
        const age = Math.max(0, now - (info?.bornAt || now));
        const targetIsAboveTree = y < treeY;
        if (age < fallDuration) {
          const t = age / fallDuration;
          const eased = 1 - Math.pow(1 - t, 3);
          const treeScreenX = camera.x + treeX * TILE_SIZE;
          const treeScreenY = camera.y + treeY * TILE_SIZE;
          const startX = treeScreenX + (TILE_SIZE - drawW) / 2;
          if (targetIsAboveTree) {
            drawX = finalX;
            drawY = baseFinalY - (1 - eased) * 10;
            alpha = 0.2 + 0.8 * eased;
            shadowAlphaMul = t >= 0.82 ? (t - 0.82) / 0.18 : 0;
          } else {
            const startY = treeScreenY - TILE_SIZE * 1.15;
            drawX = startX + (finalX - startX) * eased;
            drawY = startY + (baseFinalY - startY) * eased;
            alpha = 0.2 + 0.8 * eased;
            shadowAlphaMul = 0.2 + 0.8 * eased;
          }
        }
        const fadeOutStartAge = Math.max(0, LOOSE_ACORN_LIFETIME_MS - LOOSE_ACORN_FADE_OUT_MS);
        if (age > fadeOutStartAge) {

      }
      const elapsed = Math.max(0, now - chestReleaseTransition.startedAt);
      const chestProgress = Math.max(0, Math.min(1, elapsed / CHEST_RELEASE_CHEST_FADE_MS));
      const shadowProgress = Math.max(0, Math.min(1, (elapsed - CHEST_RELEASE_SHADOW_DELAY_MS) / CHEST_RELEASE_SHADOW_FADE_MS));
      const shadowMoveT = 1 - Math.pow(1 - shadowProgress, 2);
      return {
        shadowAlpha: shadowProgress,
        shadowDrawX: chestReleaseTransition.shadowStartX + (chestReleaseTransition.shadowEndX - chestReleaseTransition.shadowStartX) * shadowMoveT,
        shadowDrawY: chestReleaseTransition.shadowStartY + (chestReleaseTransition.shadowEndY - chestReleaseTransition.shadowStartY) * shadowMoveT,
        chestOpenAlpha: chestProgress,
        chestMountedAlpha: Math.max(0, 1 - chestProgress)
      };
    }

    function drawShadowAtWorld(worldX, worldY, now, alpha = 1) {
      const screenX = Math.floor(camera.x + worldX * TILE_SIZE - TILE_SIZE / 2);
      const screenY = Math.floor(camera.y + worldY * TILE_SIZE - TILE_SIZE / 2 + PLAYER_DRAW_OFFSET_Y);
      const drawScale = 0.5;
      const drawW = Math.floor(TILE_SIZE * drawScale);
      const drawH = Math.floor(TILE_SIZE * drawScale);
      const drawX = screenX + Math.floor((TILE_SIZE - drawW) / 2);
      const drawY = screenY - 5 + Math.floor((TILE_SIZE - drawH) / 2);

      ctx.save();
      ctx.globalAlpha = Math.max(0, Math.min(1, alpha));

      if (!player.moving) {
        const flipX = player.facingX < 0;
        if (loaded.shadowIdleAnim) {
          const frame = getShadowIdleFrame(now);
          drawSpriteFrameMirrored(
            assets.shadowIdleAnim,
            SHADOW_IDLE_FRAMES,
            frame,
            drawX,
            drawY,
            drawW,
            drawH,
            flipX
          );
        } else if (loaded.shadow) {
          if (!flipX) {
            ctx.drawImage(assets.shadow, drawX, drawY, drawW, drawH);
          } else {
            ctx.save();
            ctx.translate(drawX + drawW, drawY);
            ctx.scale(-1, 1);
            ctx.drawImage(assets.shadow, 0, 0, assets.shadow.width, assets.shadow.height, 0, 0, drawW, drawH);
            ctx.restore();
          }
        } else {
          ctx.drawImage(shadowSpriteCanvas, drawX, drawY, drawW, drawH);
        }
      } else if (loaded.shadowWalk) {
        const frame = getShadowWalkFrame();
        const flipX = player.facingX < 0;
        drawSpriteFrameMirrored(
          assets.shadowWalk,
          SHADOW_WALK_FRAMES,
          frame,
          drawX,
          drawY,
          drawW,
          drawH,
          flipX
        );
      } else if (loaded.shadow) {
        const flipX = player.facingX < 0;
        if (!flipX) {
          ctx.drawImage(assets.shadow, drawX, drawY, drawW, drawH);
        } else {
          ctx.save();
          ctx.translate(drawX + drawW, drawY);
          ctx.scale(-1, 1);
          ctx.drawImage(assets.shadow, 0, 0, assets.shadow.width, assets.shadow.height, 0, 0, drawW, drawH);
          ctx.restore();
        }
      } else {
        ctx.drawImage(shadowSpriteCanvas, drawX, drawY, drawW, drawH);
      }

      ctx.restore();
    }

	const CHEST_BITE_ANIM_FRAMES = 14;
	const CHEST_BITE_FRAME_MS = 45;
	const CHEST_BITE_IMPACT_FRAME = 10;
	const CHEST_BITE_IMPACT_DELAY_MS = CHEST_BITE_IMPACT_FRAME * CHEST_BITE_FRAME_MS;
	const CHEST_BITE_ANIM_DURATION = CHEST_BITE_ANIM_FRAMES * CHEST_BITE_FRAME_MS;
	const CHEST_BITE_RESULT_HOLD_MS = 140;
	const chestBiteAnim = { active: false, startedAt: 0, x: 0, y: 0, impactApplied: false, pendingEffect: null };

	function getMountedChestAnimFrame(now = performance.now()) {
	  return Math.floor(now / CHEST_MOUNTED_FRAME_MS) % CHEST_MOUNTED_ANIM_FRAMES;
	}

	function startChestBiteAnimation(x, y, now = performance.now(), pendingEffect = null) {
	  chestBiteAnim.active = true;
	  chestBiteAnim.startedAt = now;
	  chestBiteAnim.x = x;
	  chestBiteAnim.y = y;
	  chestBiteAnim.impactApplied = false;
	  chestBiteAnim.pendingEffect = pendingEffect;
	}

	function resolveChestBiteImpact(now = performance.now()) {
	  if (!chestBiteAnim.pendingEffect || chestBiteAnim.impactApplied) return false;
	  const effect = chestBiteAnim.pendingEffect;
	  chestBiteAnim.impactApplied = true;

	  if (effect.kind === 'hero') {
	    const hero = effect.hero;
	    if (hero && monsters.includes(hero)) {
	      hero.hp = Math.max(0, (hero.hp == null ? 5 : hero.hp) - effect.totalDamage);
	    }
	    spawnFloatingText(`-${effect.totalDamage}`, effect.targetX, effect.targetY, now, {
	      color: '#ffdf7a',
	      outline: 'rgba(55, 0, 0, 0.85)',
	      size: 22,
	      rise: 26,
	    });
	    mountedMenu.ambushOutcome = hero && hero.hp <= 0 ? 'kill' : 'survive';
	    return true;
	  }

	  if (effect.kind === 'tree') {
	    spawnFloatingText(`-${effect.totalDamage}`, effect.targetX, effect.targetY, now, {
	      color: '#ffdf7a',
	      outline: 'rgba(55, 0, 0, 0.85)',
	      size: 22,
	      rise: 24,
	    });
	    removeTreeImmediately(effect.targetX, effect.targetY);
	    mountedMenu.ambushOutcome = 'tree';
	    return true;
	  }

	  spawnFloatingText('MISS', effect.targetX, effect.targetY, now, {
	    color: '#d9e7ff',
	    outline: 'rgba(0, 0, 0, 0.85)',
	    size: 18,
	    rise: 18,
	  });
	  mountedMenu.ambushOutcome = 'miss';
	  return true;
	}

	function isChestBiteAnimationActive(now = performance.now()) {
	  if (!chestBiteAnim.active) return false;
	  const elapsed = Math.max(0, now - chestBiteAnim.startedAt);
	  if (!chestBiteAnim.impactApplied && elapsed >= CHEST_BITE_IMPACT_DELAY_MS) {
	    resolveChestBiteImpact(now);
	  }
	  if (elapsed >= CHEST_BITE_ANIM_DURATION) {
	    chestBiteAnim.active = false;
	    chestBiteAnim.pendingEffect = null;
	    return false;
	  }
	  return true;
	}

	function getChestBiteAnimFrame(now = performance.now()) {
	  const elapsed = Math.max(0, now - chestBiteAnim.startedAt);
	  return Math.min(CHEST_BITE_ANIM_FRAMES - 1, Math.floor(elapsed / CHEST_BITE_FRAME_MS));
	}

	function drawChestAtWorld(cx, cy, options = {}) {
	  const now = options.now ?? performance.now();
	  const screenX = camera.x + cx * TILE_SIZE - TILE_SIZE / 2;
	  const screenY = camera.y + cy * TILE_SIZE - TILE_SIZE / 2 + PLAYER_DRAW_OFFSET_Y;

	  const drawScale = 0.75;
	  const drawW = Math.floor(TILE_SIZE * drawScale);
	  const drawH = Math.floor(TILE_SIZE * drawScale);
	  const drawX = screenX + Math.floor((TILE_SIZE - drawW) / 2);
	  const drawY = screenY + Math.floor((TILE_SIZE - drawH) / 2);

	  const usingBiteChest = options.variant === 'bite';
	  const usingMountedChest = options.variant === 'mounted'
		? true
		: (options.variant === 'open' || options.variant === 'closed' || usingBiteChest)
		  ? false
		  : player.form === 'chest';
	  const useOpenChest = options.variant === 'open' || (!usingMountedChest && !usingBiteChest && options.highlighted && loaded.chestOpen);
	  const forceClosedChest = options.variant === 'closed';

	  if (usingBiteChest && loaded.chestBiteAnim) {
		drawAnimatedStripFrame(assets.chestBiteAnim, CHEST_BITE_ANIM_FRAMES, getChestBiteAnimFrame(now), drawX, drawY, drawW, drawH);
		return;
	  }

	  if (usingMountedChest && loaded.chestMountedAnim) {
		drawAnimatedStripFrame(assets.chestMountedAnim, CHEST_MOUNTED_ANIM_FRAMES, getMountedChestAnimFrame(now), drawX, drawY, drawW, drawH);
		return;
	  }

	  const chestImage = usingMountedChest
		? assets.chestMounted
		: (useOpenChest ? assets.chestOpen : assets.chest);
	  const chestLoaded = usingMountedChest
		? loaded.chestMounted
		: (useOpenChest ? loaded.chestOpen : loaded.chest);

	  if (chestLoaded) {
		ctx.drawImage(chestImage, drawX, drawY, drawW, drawH);
		return;
	  }

	  if ((forceClosedChest || !usingMountedChest) && loaded.chest) {
		ctx.drawImage(assets.chest, drawX, drawY, drawW, drawH);
		return;
	  }

	  ctx.drawImage(playerSpriteCanvas, screenX, screenY, TILE_SIZE, TILE_SIZE);
	}

    function drawHeldTileBubble(now) {
      if (player.form !== 'shadow' || !player.heldTile) return;
      const playerPx = getPlayerPixelPosition();
      const screenX = Math.floor(camera.x + playerPx.x - TILE_SIZE / 2);
      const screenY = Math.floor(camera.y + playerPx.y - TILE_SIZE / 2 + PLAYER_DRAW_OFFSET_Y);
      const bubbleW = 26;
      const bubbleH = 24;
      const bubbleX = screenX + 19;
      const bob = Math.sin(now / 280) * 1.5;
      const bubbleY = screenY - 10 + bob;
      ctx.fillStyle = 'rgba(255,255,255,0.92)';
      ctx.fillRect(bubbleX, bubbleY, bubbleW, bubbleH);
      ctx.strokeStyle = 'rgba(40,40,40,0.9)';
      ctx.lineWidth = 2;
      ctx.strokeRect(bubbleX + 0.5, bubbleY + 0.5, bubbleW - 1, bubbleH - 1);
      ctx.beginPath();
      ctx.moveTo(bubbleX + 10, bubbleY + bubbleH);
      ctx.lineTo(bubbleX + 14, bubbleY + bubbleH + 5);
      ctx.lineTo(bubbleX + 18, bubbleY + bubbleH);
      ctx.closePath();
      ctx.fillStyle = 'rgba(255,255,255,0.92)';
      ctx.fill();
      ctx.stroke();

      const iconX = bubbleX + 5;
      const iconY = bubbleY + 4;
      const iconSize = 16;
      if (player.heldTile === 'grass') {
        const playerTile = getPlayerTile();
        const grassVariant = grassVariants.get(keyOf(playerTile.x, playerTile.y)) || 'a';
        const grassImage = grassVariant === 'b' && loaded.grassB ? assets.grassB : assets.grass;
        if ((grassVariant === 'b' && loaded.grassB) || loaded.grass) {
          ctx.drawImage(grassImage, iconX, iconY, iconSize, iconSize);
          return;
        }
      }
      if (player.heldTile === 'dirt') {
        if (loaded.dirt) {
          ctx.drawImage(assets.dirt, iconX, iconY, iconSize, iconSize);
          return;
        }
      }
      if (player.heldTile === 'acorn') {
        if (loaded.acorn) {
          ctx.drawImage(assets.acorn, iconX, iconY, iconSize, iconSize);
          return;
        }
      }
      if (player.heldTile === 'water') {
        if (loaded.water) {
          drawAnimatedStripFrame(assets.water, WATER_TOP_FRAMES, getWaterTopFrame(now), iconX, iconY, iconSize, iconSize);
          return;
        }
      }
      const fallbackColors = { grass: '#7edc7d', dirt: '#8b5a3c', water: '#6cd9e6' };
      ctx.fillStyle = fallbackColors[player.heldTile] || '#ccc';
      ctx.fillRect(iconX, iconY, iconSize, iconSize);
    }

    function getShadowIdleFrame(now = performance.now()) {
      return Math.floor(now / SHADOW_IDLE_FRAME_MS) % SHADOW_IDLE_FRAMES;
    }

    function getShadowWalkFrame() {
      if (!player.moving) return 0;
      return Math.floor(player.animTime / SHADOW_WALK_FRAME_MS) % SHADOW_WALK_FRAMES;
    }

    function drawSpriteFrameMirrored(img, frameCount, frameIndex, dx, dy, dw, dh, flipX = false) {
      const frameW = img.width / frameCount;
      const sx = Math.floor(frameW * frameIndex);

      if (!flipX) {
        ctx.drawImage(img, sx, 0, frameW, img.height, dx, dy, dw, dh);
        return;
      }

      ctx.save();
      ctx.translate(dx + dw, dy);
      ctx.scale(-1, 1);
      ctx.drawImage(img, sx, 0, frameW, img.height, 0, 0, dw, dh);
      ctx.restore();
    }

    function drawPlayer(now) {
      if (chestReleaseTransition.active) {
        getChestReleaseProgress(now);
        const visual = getChestReleaseVisualState(now);

        if (visual.chestMountedAlpha > 0) {
          ctx.save();
          ctx.globalAlpha = visual.chestMountedAlpha;
          drawChestAtWorld(chestReleaseTransition.chestX, chestReleaseTransition.chestY, { variant: 'mounted' });
          ctx.restore();
        }

        if (visual.chestOpenAlpha > 0) {
          ctx.save();
          ctx.globalAlpha = visual.chestOpenAlpha;
          drawChestAtWorld(chestReleaseTransition.chestX, chestReleaseTransition.chestY, { variant: 'open' });
          ctx.restore();
        }

        if (visual.shadowAlpha > 0) {
          drawShadowAtWorld(visual.shadowDrawX, visual.shadowDrawY, now, visual.shadowAlpha);
        }
        return;
      }

      if (player.form === 'chest') {
        if (chestPossessTransition.active) {
          getChestPossessProgress(now);
          const visual = getChestPossessVisualState(now);

          if (visual.chestOpenAlpha > 0) {
            ctx.save();
            ctx.globalAlpha = visual.chestOpenAlpha;
            drawChestAtWorld(chestPossessTransition.chestX, chestPossessTransition.chestY, { variant: 'open' });
            ctx.restore();
          }

          if (visual.chestMountedAlpha > 0) {
            ctx.save();
            ctx.globalAlpha = visual.chestMountedAlpha;
            drawChestAtWorld(chestPossessTransition.chestX, chestPossessTransition.chestY, { variant: 'mounted' });
            ctx.restore();
          }

          if (visual.shadowAlpha > 0) {
            drawShadowAtWorld(visual.shadowDrawX, visual.shadowDrawY, now, visual.shadowAlpha);
          }
          return;
        }

        if (isChestBiteAnimationActive(now)) {
          drawChestAtWorld(player.x, player.y, { variant: 'bite', now });
        } else if (mountedMenu.open && (mountedMenu.mode === 'ambush_roll' || mountedMenu.mode === 'ambush_result')) {
          drawChestAtWorld(player.x, player.y, { variant: 'open' });
        } else if (player.hiddenInChest) {
          drawChestAtWorld(player.x, player.y, { variant: 'closed' });
        } else {
          drawChestAtWorld(player.x, player.y);
        }
        return;
      }

      drawShadowAtWorld(player.x, player.y, now, 1);
      drawHeldTileBubble(now);
    }

    function drawChestObject() {
      if (!chestState.placed || chestReleaseTransition.active) return;
      const chestTarget = getChestInteractTarget();
      const isHighlighted = !!chestTarget && player.form === 'shadow';
      drawChestAtWorld(chestState.x, chestState.y, { highlighted: isHighlighted });
    }

    function drawReflectionSprite(spriteCanvas, worldX, worldY, bounds, now, alphaBase) {
      const screenX = camera.x + worldX * TILE_SIZE - TILE_SIZE / 2;
      const screenY = camera.y + worldY * TILE_SIZE - TILE_SIZE / 2 + PLAYER_DRAW_OFFSET_Y;
      const reflectionTop = screenY + 48;
      const reflectionHeight = Math.floor(TILE_SIZE * 0.82);
      const sliceCount = 8;
      const sourceSliceH = Math.floor(TILE_SIZE / sliceCount);
      const destSliceH = reflectionHeight / sliceCount;

      let hasVisibleWater = false;
      ctx.save();
      ctx.beginPath();
      for (let y = bounds.minY; y <= bounds.maxY; y++) {
        for (let x = bounds.minX; x <= bounds.maxX; x++) {
          if (tileAt(x, y) !== 'water') continue;
          const tileScreenX = camera.x + x * TILE_SIZE;
          const tileScreenY = camera.y + y * TILE_SIZE;
          ctx.rect(tileScreenX, tileScreenY, TILE_SIZE, TILE_SIZE);
          hasVisibleWater = true;
        }
      }

      if (!hasVisibleWater) {
        ctx.restore();
        return;
      }

      ctx.clip();
      for (let i = 0; i < sliceCount; i++) {
        const sway = Math.round(Math.sin(now / 180 + i * 1.35) * 2);
        const srcY = TILE_SIZE - (i + 1) * sourceSliceH;
        const destY = reflectionTop + i * destSliceH;
        const fade = alphaBase * (1 - i / (sliceCount * 1.05));
        ctx.globalAlpha = fade;
        ctx.drawImage(
          spriteCanvas,
          0,
          srcY,
          TILE_SIZE,
          sourceSliceH,
          screenX + sway,
          destY,
          TILE_SIZE,
          destSliceH
        );
      }

      ctx.restore();
    }

    function drawPlayerReflection(bounds, now) {
      if (player.form === 'shadow') {
        drawReflectionSprite(playerSpriteCanvas, chestState.x, chestState.y, bounds, now, 0.34);
        drawReflectionSprite(shadowSpriteCanvas, player.x, player.y, bounds, now, 0.28);
        return;
      }
      drawReflectionSprite(playerSpriteCanvas, player.x, player.y, bounds, now, 0.34);
    }

    function getVisibleBiomeStats(bounds, treeTiles) {
      let totalScreenTiles = 0;
      let nonVoidTiles = 0;
      let dirtTiles = 0;
      let grassTiles = 0;
      let waterTiles = 0;
      let validTreeTiles = 0;
      let treeCount = 0;

      for (let y = bounds.minY; y <= bounds.maxY; y++) {
        for (let x = bounds.minX; x <= bounds.maxX; x++) {
          totalScreenTiles++;

          const tile = tileAt(x, y);
          if (!tile) continue;

          nonVoidTiles++;
          if (tile === 'dirt') dirtTiles++;
          if (tile === 'grass') grassTiles++;
          if (tile === 'water') waterTiles++;
          if (canTreeSpawnAt(x, y)) validTreeTiles++;
          if (treeTiles.has(keyOf(x, y))) treeCount++;
        }
      }

      return { totalScreenTiles, nonVoidTiles, dirtTiles, grassTiles, waterTiles, validTreeTiles, treeCount };
    }

    function getCurrentBiome(bounds, treeTiles) {
      const stats = getVisibleBiomeStats(bounds, treeTiles);
      if (stats.totalScreenTiles <= 0) return null;

      const voidRatio = (stats.totalScreenTiles - stats.nonVoidTiles) / stats.totalScreenTiles;
      const nonVoidRatio = stats.nonVoidTiles / stats.totalScreenTiles;
      const grassRatio = stats.grassTiles / stats.totalScreenTiles;

      if (grassRatio >= 0.7 && stats.treeCount >= FOREST_TREE_MIN_COUNT) {
        return 'Forest';
      }

      if (grassRatio > 0.5 && voidRatio < 0.2) {
        return 'Grassland';
      }

      if (nonVoidRatio > 0.8) {
        return 'Barren';
      }

      return null;
    }

    function drawBiomeLabel(name) {
      const label = name || 'The Void';

      const boxW = 120;
      const boxH = 34;
      const padX = canvas.width - boxW - 14;
      const padY = canvas.height - boxH - 14;

      ctx.save();
      ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
      ctx.fillRect(padX, padY, boxW, boxH);

      ctx.strokeStyle = 'rgba(255,255,255,0.18)';
      ctx.strokeRect(padX + 0.5, padY + 0.5, boxW - 1, boxH - 1);

      ctx.fillStyle = '#f2f2f2';
      ctx.font = '16px Arial';
      ctx.textBaseline = 'middle';
      ctx.fillText(label, padX + 12, padY + boxH / 2);
      ctx.restore();
    }


    const VOID_PARTICLE_COUNT = 28;
    const voidParticles = Array.from({ length: VOID_PARTICLE_COUNT }, (_, i) => ({
      seed: i + 1,
      x: ((i * 53) % 100) / 100,
      y: ((i * 37) % 100) / 100,
      size: 1 + (i % 3),
      speed: 0.2 + (i % 5) * 0.05,
      drift: 8 + (i % 6) * 4,
      alpha: 0.05 + (i % 4) * 0.015
    }));

    function drawVoidBackground(now) {
      const time = now * 0.001;

      ctx.save();
      ctx.fillStyle = '#07050a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const glow = ctx.createRadialGradient(
        canvas.width * 0.5,
        canvas.height * 0.45,
        0,
        canvas.width * 0.5,
        canvas.height * 0.45,
        Math.max(canvas.width, canvas.height) * 0.75
      );
      glow.addColorStop(0, 'rgba(62, 38, 86, 0.18)');
      glow.addColorStop(0.45, 'rgba(26, 18, 42, 0.10)');
      glow.addColorStop(1, 'rgba(0, 0, 0, 0)');
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.globalCompositeOperation = 'screen';
      for (let i = 0; i < 3; i++) {
        const hazeX = canvas.width * (0.22 + i * 0.28) + Math.sin(time * (0.08 + i * 0.03) + i * 1.7) * (24 + i * 8);
        const hazeY = canvas.height * (0.3 + i * 0.18) + Math.cos(time * (0.06 + i * 0.02) + i * 2.3) * (18 + i * 6);
        const hazeR = 120 + i * 34;
        const haze = ctx.createRadialGradient(hazeX, hazeY, 0, hazeX, hazeY, hazeR);
        haze.addColorStop(0, `rgba(${50 + i * 8}, ${28 + i * 4}, ${72 + i * 10}, 0.05)`);
        haze.addColorStop(1, 'rgba(0, 0, 0, 0)');
        ctx.fillStyle = haze;
        ctx.beginPath();
        ctx.arc(hazeX, hazeY, hazeR, 0, Math.PI * 2);
        ctx.fill();
      }

      for (const particle of voidParticles) {
        const px = ((particle.x * canvas.width) + time * particle.speed * 18 + Math.sin(time * 0.7 + particle.seed) * particle.drift) % (canvas.width + 24) - 12;
        const pyBase = particle.y * canvas.height;
        const py = (pyBase + Math.sin(time * 0.45 + particle.seed * 1.9) * particle.drift * 0.7 + time * particle.speed * 4) % (canvas.height + 24) - 12;
        ctx.fillStyle = `rgba(170, 150, 210, ${particle.alpha})`;
        ctx.fillRect(Math.round(px), Math.round(py), particle.size, particle.size);
      }

      ctx.globalCompositeOperation = 'source-over';
      const vignette = ctx.createRadialGradient(
        canvas.width * 0.5,
        canvas.height * 0.5,
        Math.min(canvas.width, canvas.height) * 0.18,
        canvas.width * 0.5,
        canvas.height * 0.5,
        Math.max(canvas.width, canvas.height) * 0.72
      );
      vignette.addColorStop(0, 'rgba(0, 0, 0, 0)');
      vignette.addColorStop(0.72, 'rgba(0, 0, 0, 0.18)');
      vignette.addColorStop(1, 'rgba(0, 0, 0, 0.52)');
      ctx.fillStyle = vignette;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.restore();
    }

    function getMonsterDistanceToPlayer(monster) {
      return Math.hypot(monster.x - player.x, monster.y - player.y);
    }

    function getMonsterInteractRange(monster) {
      if (monster.type === 'heroWanderer') return HERO_WANDERER_INTERACT_RANGE;
      return GREEN_SLIME_INTERACT_RANGE;
    }

    function getNearbyInteractableMonster() {
      if (player.form !== 'shadow') return null;

      let best = null;
      let bestDist = Infinity;

      for (const monster of monsters) {
        const dist = getMonsterDistanceToPlayer(monster);
        if (dist > getMonsterInteractRange(monster)) continue;
        if (dist < bestDist) {
          best = monster;
          bestDist = dist;
        }
      }

      return best;
    }

    function getChestInteractTarget() {
      if (player.form !== 'shadow' || !chestState.placed) return null;

      const dist = Math.hypot(chestState.x - player.x, chestState.y - player.y);
      if (dist > CHEST_INTERACT_RANGE) return null;

      return {
        type: 'chest',
        x: chestState.x,
        y: chestState.y,
      };
    }

    function getCurrentInteractionTarget() {
      const chestTarget = getChestInteractTarget();
      if (chestTarget) return chestTarget;

      const monsterTarget = getNearbyInteractableMonster();
      if (monsterTarget) {
        return {
          type: 'monster',
          monster: monsterTarget,
        };
      }

      const looseAcornTarget = getLooseAcornPickupTarget();
      if (looseAcornTarget) {
        return { type: 'pickupAcorn', x: looseAcornTarget.x, y: looseAcornTarget.y };
      }

      const acornTarget = getAcornPlantTarget(performance.now());
      if (acornTarget) {
        return { type: 'acorn', x: acornTarget.x, y: acornTarget.y };
      }

      const tileTarget = getHeldTileTarget();
      if (tileTarget) {
        return {
          type: 'tile',
          x: tileTarget.x,
          y: tileTarget.y,
          name: tileTarget.name,
        };
      }

      return null;
    }

    function tryInteractWithMonster(now = performance.now()) {
      const monster = getNearbyInteractableMonster();
      if (!monster) return false;

      monster.alertUntil = now + GREEN_SLIME_ALERT_MS;
      render(now);
      return true;
    }

    function runEncounterBannerAction(action, now = performance.now()) {
      heroEngagement.bannerAction = null;
      if (action === 'escape' || action === 'finish_ambush') {
        if (isHeroEngagementActive() && !heroEngagement.transition) {
          beginRetreatTransition(now);
        }
        return;
      }

      if (action === 'menu') {
        if (!isHeroEngagementActive()) return;
        heroEngagement.mode = 'idle';
        openHeroActionMenu();
      }
    }

    function showEncounterBanner(text, now = performance.now(), action = null) {
      if (encounterBannerTimeout) {
        clearTimeout(encounterBannerTimeout);
        encounterBannerTimeout = null;
      }
      encounterBannerText = text;
      encounterBannerUntil = now + ENCOUNTER_BANNER_MS;
      heroEngagement.bannerStartedAt = now;
      heroEngagement.bannerAction = action;
      encounterBannerTimeout = setTimeout(() => {
        const pendingAction = heroEngagement.bannerAction;
        clearEncounterBanner();
        runEncounterBannerAction(pendingAction, performance.now());
      }, ENCOUNTER_BANNER_MS);
    }

    function clearEncounterBanner() {
      if (encounterBannerTimeout) {
        clearTimeout(encounterBannerTimeout);
        encounterBannerTimeout = null;
      }
      encounterBannerText = '';
      encounterBannerUntil = 0;
      heroEngagement.bannerStartedAt = 0;
    }

    function updateEncounterBannerState(now = performance.now()) {
      if (!encounterBannerText) return;
      if (now < encounterBannerUntil) return;

      const action = heroEngagement.bannerAction || null;
      clearEncounterBanner();
      runEncounterBannerAction(action, now);
    }

    function drawEncounterBanner(now = performance.now()) {
      if (!encounterBannerText || now >= encounterBannerUntil) return;

      const boxW = Math.min(canvas.width - 80, 320);
      const boxH = 48;
      const boxX = Math.floor((canvas.width - boxW) / 2);
      const boxY = Math.floor((canvas.height - boxH) / 2);

      ctx.save();
      ctx.fillStyle = 'rgba(0, 0, 0, 0.76)';
      ctx.fillRect(boxX, boxY, boxW, boxH);
      ctx.strokeStyle = 'rgba(255,255,255,0.22)';
      ctx.lineWidth = 2;
      ctx.strokeRect(boxX + 0.5, boxY + 0.5, boxW - 1, boxH - 1);
      ctx.fillStyle = '#f7f1d1';
      ctx.font = 'bold 22px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(encounterBannerText, boxX + boxW / 2, boxY + boxH / 2 + 1);
      ctx.restore();
    }

    function isHeroEngagementActive() {
      return heroEngagement.active && heroEngagement.hero && monsters.includes(heroEngagement.hero);
    }

    function isChestHidden() {
      return player.form === 'chest' && !!player.hiddenInChest;
    }

    function isMountedMenuActive() {
      return player.form === 'chest' && mountedMenu.open;
    }

    function getMountedMenuOptions() {
      const labels = [...MOUNTED_MENU_OPTION_LABELS];
      if (isChestHidden() && labels[0] === 'Action') {
        labels[0] = isHeroEngagementActive() && heroEngagement.ambushOpening ? 'Surprise!' : 'Reveal';
      }
      return labels.map((label) => ({ label, disabled: false }));
    }

    function clampMountedMenuIndex() {
      const options = getMountedMenuOptions();
      if (!options.length) {
        mountedMenu.menuIndex = 0;
        return;
      }
      mountedMenu.menuIndex = Math.max(0, Math.min(mountedMenu.menuIndex, options.length - 1));
    }

    function openMountedActionMenu() {
      if (player.form !== 'chest') return;
      mountedMenu.open = true;
      mountedMenu.mode = 'menu';
      mountedMenu.ambushMenuIndex = 0;
      clampMountedMenuIndex();
    }

    function shouldAutoOpenMountedMenu() {
      if (player.form !== 'chest') return false;
      if (!isChestHidden()) return false;
      if (mountedMenu.open) return false;
      if (hasChestMoveTarget() || chestPossessTransition.active || chestReleaseTransition.active) return false;
      if (isHeroEngagementActive() && heroEngagement.turn !== 'player') return false;
      return true;
    }

    function closeMountedActionMenu() {
      mountedMenu.open = false;
      mountedMenu.mode = 'menu';
    }

    function endMountedPlayerTurn(now = performance.now()) {
      closeMountedActionMenu();
      if (isHeroEngagementActive()) {
        heroEngagement.turn = 'hero';
        heroEngagement.mode = 'hero_turn';
        heroEngagement.menuOpen = false;
        heroEngagement.pendingPlayerStep = null;
        return true;
      }
      incrementWorldTurn();
      trySpawnMountedHeroEncounter(now);
      return true;
    }

    function beginMountedAmbushMenu() {
      mountedMenu.open = true;
      mountedMenu.mode = 'ambush_select';
      mountedMenu.ambushMenuIndex = 0;
      mountedMenu.ambushAttack = null;
      mountedMenu.ambushRoll = null;
      mountedMenu.ambushTotalDamage = null;
      mountedMenu.ambushResultText = '';
      mountedMenu.ambushOutcome = null;
      mountedMenu.ambushDieFace = 1;
      mountedMenu.ambushDieRolling = false;
      mountedMenu.ambushDieRollStartedAt = 0;
      mountedMenu.ambushPendingRoll = null;
      mountedMenu.ambushTargetX = null;
      mountedMenu.ambushTargetY = null;
      mountedMenu.ambushResultUntil = 0;
    }

    function getCurrentBattleMenuOptions() {
      return getMountedMenuOptions();
    }

    function getCurrentActionOptions() {
      return getHeroActionOptions();
    }

    function getCurrentActionMenuIndex() {
      return mountedMenu.ambushMenuIndex;
    }

    function setCurrentActionMenuIndex(index) {
      mountedMenu.ambushMenuIndex = index;
    }

    function getCurrentBattleMode() {
      return mountedMenu.mode;
    }

    function getCurrentTargetCursor() {
      return { x: mountedMenu.targetCursorX, y: mountedMenu.targetCursorY };
    }

    function getTurnMenuOptions() {
      const labels = [...TURN_MENU_OPTION_LABELS];
      return labels.map((label) => ({
        label,
        disabled: (label === 'Move' && (heroEngagement.playerMoveUsed || isChestHidden()))
          || (label === 'Action' && heroEngagement.playerActionUsed),
      }));
    }

    function clampTurnMenuIndex() {
      const options = getTurnMenuOptions();
      if (!options.length) {
        heroEngagement.menuIndex = 0;
        return;
      }
      heroEngagement.menuIndex = Math.max(0, Math.min(heroEngagement.menuIndex, options.length - 1));
      if (options[heroEngagement.menuIndex].disabled) {
        const fallback = options.findIndex((option) => !option.disabled);
        heroEngagement.menuIndex = fallback >= 0 ? fallback : 0;
      }
    }

    function openHeroActionMenu() {
      if (!isHeroEngagementActive()) return;
      if (heroEngagement.turn !== 'player') return;
      heroEngagement.menuOpen = true;
      heroEngagement.mode = 'menu';
      heroEngagement.cameraOffsetX = 0;
      heroEngagement.cameraOffsetY = 0;
      clampTurnMenuIndex();
    }

    function closeHeroActionMenu() {
      heroEngagement.menuOpen = false;
      if (heroEngagement.mode === 'menu') {
        heroEngagement.mode = 'idle';
      }
    }

    function beginHeroEngagement(hero, now = performance.now()) {
      heroEngagement.active = true;
      heroEngagement.hero = hero;
      heroEngagement.turn = 'hero';
      heroEngagement.menuOpen = false;
      heroEngagement.menuIndex = 0;
      heroEngagement.playerMoveUsed = false;
      heroEngagement.playerActionUsed = false;
      heroEngagement.mode = 'hero_turn';
      heroEngagement.pendingPlayerStep = null;
      heroEngagement.transition = null;
      heroEngagement.cameraOffsetX = 0;
      heroEngagement.cameraOffsetY = 0;
      heroEngagement.ambushMenuIndex = 0;
      heroEngagement.ambushAttack = null;
      heroEngagement.ambushRoll = null;
      heroEngagement.ambushTotalDamage = null;
      heroEngagement.ambushResultText = '';
      heroEngagement.ambushOutcome = null;
      heroEngagement.ambushOpening = false;
      clearEncounterBanner();
      closeMountedActionMenu();
      input.up = false;
      input.down = false;
      input.left = false;
      input.right = false;
    }

    function endHeroEngagementImmediate() {
      if (heroEngagement.hero) {
        const idx = monsters.indexOf(heroEngagement.hero);
        if (idx >= 0) monsters.splice(idx, 1);
      }
      heroEngagement.active = false;
      heroEngagement.hero = null;
      heroEngagement.turn = 'player';
      heroEngagement.menuOpen = false;
      heroEngagement.menuIndex = 0;
      heroEngagement.playerMoveUsed = false;
      heroEngagement.playerActionUsed = false;
      heroEngagement.mode = 'idle';
      heroEngagement.pendingPlayerStep = null;
      heroEngagement.transition = null;
      heroEngagement.cameraOffsetX = 0;
      heroEngagement.cameraOffsetY = 0;
      heroEngagement.bannerAction = null;
      heroEngagement.ambushMenuIndex = 0;
      heroEngagement.ambushAttack = null;
      heroEngagement.ambushRoll = null;
      heroEngagement.ambushTotalDamage = null;
      heroEngagement.ambushResultText = '';
      heroEngagement.ambushOutcome = null;
      heroEngagement.ambushOpening = false;
      player.hiddenInChest = false;
      clearEncounterBanner();
    }

    function handControlToPlayerDuringHeroEncounter() {
      if (!isHeroEngagementActive()) return;
      heroEngagement.turn = 'player';
      heroEngagement.mode = 'idle';
      heroEngagement.menuOpen = false;
      heroEngagement.menuIndex = 0;
      heroEngagement.playerMoveUsed = false;
      heroEngagement.playerActionUsed = false;
      heroEngagement.pendingPlayerStep = null;
      heroEngagement.cameraOffsetX = 0;
      heroEngagement.cameraOffsetY = 0;
      heroEngagement.ambushMenuIndex = 0;
      heroEngagement.ambushAttack = null;
      heroEngagement.ambushRoll = null;
      heroEngagement.ambushTotalDamage = null;
      heroEngagement.ambushResultText = '';
      heroEngagement.ambushOutcome = null;
      heroEngagement.ambushDieFace = 1;
      heroEngagement.ambushDieRolling = false;
      heroEngagement.ambushDieRollStartedAt = 0;
      heroEngagement.ambushPendingRoll = null;
      heroEngagement.targetCursorX = 0;
      heroEngagement.targetCursorY = 0;
      heroEngagement.ambushTargetX = null;
      heroEngagement.ambushTargetY = null;
      closeMountedActionMenu();
      if (shouldAutoOpenMountedMenu()) {
        openMountedActionMenu();
      }
    }

    function beginRetreatTransition(now = performance.now()) {
      if (!isHeroEngagementActive()) return;
      closeHeroActionMenu();
      clearChestMoveTarget();
      heroEngagement.pendingPlayerStep = null;
      endHeroEngagementImmediate();
    }


    function beginHeroEscape(now = performance.now()) {
      if (!isHeroEngagementActive()) return;
      closeHeroActionMenu();
      clearChestMoveTarget();
      heroEngagement.pendingPlayerStep = null;
      endHeroEngagementImmediate();
    }

    function beginHeroRanAway(now = performance.now()) {
      if (!isHeroEngagementActive()) return;
      closeHeroActionMenu();
      clearChestMoveTarget();
      heroEngagement.pendingPlayerStep = null;
      endHeroEngagementImmediate();
    }

    function moveTurnMenuSelection(delta) {
      if (!isMountedMenuActive()) return;
      const options = getMountedMenuOptions();
      if (!options.length) return;
      let next = mountedMenu.menuIndex;
      for (let i = 0; i < options.length; i += 1) {
        next = (next + delta + options.length) % options.length;
        if (!options[next].disabled) break;
      }
      mountedMenu.menuIndex = next;
    }

    function confirmTurnMenuSelection(now = performance.now()) {
      if (!isMountedMenuActive()) return false;
      if (mountedMenu.mode !== 'menu') return false;
      const options = getMountedMenuOptions();
      const choice = options[mountedMenu.menuIndex];
      if (!choice || choice.disabled) return false;

      switch (choice.label) {
        case 'Action':
          heroEngagement.ambushOpening = false;
          beginMountedAmbushMenu();
          return true;
        case 'Surprise!':
          heroEngagement.ambushOpening = true;
          beginMountedAmbushMenu();
          return true;
        case 'Reveal':
          player.hiddenInChest = false;
          heroEngagement.ambushOpening = false;
          closeMountedActionMenu();
          return endMountedPlayerTurn(now);
        case 'Wait':
          heroEngagement.ambushOpening = false;
          return endMountedPlayerTurn(now);
        case 'Dismount':
          heroEngagement.ambushOpening = false;
          closeMountedActionMenu();
          toggleShadowForm();
          return true;
        default:
          return false;
      }
    }

    function queueHeroPlayerStep(dx, dy) {
      if (!isHeroEngagementActive()) return false;
      if (heroEngagement.turn !== 'player') return false;
      if (heroEngagement.mode !== 'await_move') return false;
      if (heroEngagement.playerMoveUsed) return false;
      if (hasChestMoveTarget()) return false;
      heroEngagement.pendingPlayerStep = { dx, dy };
      return true;
    }

    function isHeroAdjacentToCurrentChest(hero) {
      if (!hero) return false;
      const chestTile = getCurrentChestTile();
      const heroTileX = Math.floor(hero.x);
      const heroTileY = Math.floor(hero.y);
      return Math.abs(heroTileX - chestTile.x) + Math.abs(heroTileY - chestTile.y) === 1;
    }

    function startHeroAmbush(now = performance.now()) {
      if (!isHeroEngagementActive()) return false;
      const hero = heroEngagement.hero;
      if (!hero || !isHeroAdjacentToCurrentChest(hero) || !isChestHidden()) return false;
      clearChestMoveTarget();
      hero.turnTargetX = null;
      hero.turnTargetY = null;
      hero.moving = false;
      heroEngagement.turn = 'player';
      heroEngagement.mode = 'idle';
      heroEngagement.menuOpen = false;
      heroEngagement.pendingPlayerStep = null;
      heroEngagement.cameraOffsetX = 0;
      heroEngagement.cameraOffsetY = 0;
      heroEngagement.ambushMenuIndex = 0;
      heroEngagement.ambushAttack = null;
      heroEngagement.ambushRoll = null;
      heroEngagement.ambushTotalDamage = null;
      heroEngagement.ambushResultText = '';
      heroEngagement.ambushOutcome = null;
      heroEngagement.ambushDieFace = 1;
      heroEngagement.ambushDieRolling = false;
      heroEngagement.ambushDieRollStartedAt = 0;
      heroEngagement.ambushPendingRoll = null;
      heroEngagement.targetCursorX = 0;
      heroEngagement.targetCursorY = 0;
      heroEngagement.ambushTargetX = null;
      heroEngagement.ambushTargetY = null;
      heroEngagement.ambushOpening = true;
      closeMountedActionMenu();
      if (shouldAutoOpenMountedMenu()) {
        openMountedActionMenu();
      }
      return true;
    }

    function moveAmbushMenuSelection(delta) {
      const options = getCurrentActionOptions();
      if (!options.length) return;
      let next = getCurrentActionMenuIndex();
      for (let i = 0; i < options.length; i += 1) {
        next = (next + delta + options.length) % options.length;
        if (!options[next].disabled) break;
      }
      setCurrentActionMenuIndex(next);
    }

    function getHeroActionTargetTiles(attack = null) {
      const chestTile = getCurrentChestTile();
      return [
        { x: chestTile.x + 1, y: chestTile.y },
        { x: chestTile.x - 1, y: chestTile.y },
