      player.y = chestState.y;
      clearChestMoveTarget();
      chestState.placed = false;
      chestPossessTransition.active = true;
      chestPossessTransition.startedAt = performance.now();
      chestPossessTransition.duration = CHEST_POSSESS_MS;
      chestPossessTransition.shadowX = startShadowX;
      chestPossessTransition.shadowY = startShadowY;
      chestPossessTransition.chestX = player.x;
      chestPossessTransition.chestY = player.y;
      clearSelectedTree();
      syncItemBarUi();
      render();
    }

    function setHeldTile(type) {
      if (type === 'acorn' && (player.acornCount || 0) <= 0) {
        player.heldTile = null;
      } else {
        player.heldTile = type || null;
      }
      clearSelectedTree();
      syncItemBarUi();
      render();
    }

    function clearRecallCharge() {
      input.space = false;
      player.ghostChargeStartAt = null;
    }

    function recallToChest() {
      if (player.form !== 'shadow' || !chestState.placed) return false;
      pauseEnvironment();
      chestPossessTransition.active = false;
      player.form = 'chest';
      player.hiddenInChest = false;
      player.x = chestState.x;
      player.y = chestState.y;
      clearChestMoveTarget();
      chestState.placed = false;
      player.heldTile = null;
      player.ghostChargeStartAt = null;
      clearSelectedTree();
      input.space = false;
      syncItemBarUi();
      render();
      return true;
    }

    function updateRecallCharge(now = performance.now()) {
      if (player.form !== 'shadow' || !chestState.placed) {
        player.ghostChargeStartAt = null;
        return;
      }

      if (!input.space || player.ghostChargeStartAt == null) return;

      if (now - player.ghostChargeStartAt >= RECALL_CHARGE_MS) {
        recallToChest();
      }
    }

    function toggleShadowForm() {
  if (player.form === 'chest') {
    closeMountedActionMenu();
    chestPossessTransition.active = false;
    chestReleaseTransition.active = false;
    chestState.placed = true;
    chestState.x = player.x;
    chestState.y = player.y;

    const exitX = chestState.x;
    const exitY = chestState.y + 0.25;

    clearRecallCharge();
    clearChestMoveTarget();
    player.hiddenInChest = false;
    player.form = 'shadow';
    player.heldTile = null;
    clearSelectedTree();
    lockHeldMovementUntilRelease();

    if (isWalkableBody(exitX, exitY)) {
      player.x = exitX;
      player.y = exitY;
    } else {
      player.x = chestState.x;
      player.y = chestState.y;
    }

    chestReleaseTransition.active = true;
    chestReleaseTransition.startedAt = performance.now();
    chestReleaseTransition.duration = CHEST_RELEASE_MS;
    chestReleaseTransition.shadowStartX = chestState.x;
    chestReleaseTransition.shadowStartY = chestState.y;
    chestReleaseTransition.shadowEndX = player.x;
    chestReleaseTransition.shadowEndY = player.y;
    chestReleaseTransition.chestX = chestState.x;
    chestReleaseTransition.chestY = chestState.y;

    resumeEnvironment(performance.now());
    syncItemBarUi();
    render();
    return;
  }

  if (isOnChestTile()) {
    mountChest();
  }
}

    itemButtons.forEach((btn) => {
      btn.addEventListener('click', () => {
        if (!isItemBarOpen()) return;
        setHeldTile(btn.dataset.equip || null);
      });
    });

    function setMovementKey(key, isDown) {
      if (key === 'arrowup' || key === 'w') {
        if (isDown) {
          if (!movementReleaseGate.up) input.up = true;
        } else {
          input.up = false;
          movementReleaseGate.up = false;
        }
      }
      if (key === 'arrowdown' || key === 's') {
        if (isDown) {
          if (!movementReleaseGate.down) input.down = true;
        } else {
          input.down = false;
          movementReleaseGate.down = false;
        }
      }
      if (key === 'arrowleft' || key === 'a') {
        if (isDown) {
          if (!movementReleaseGate.left) input.left = true;
        } else {
          input.left = false;
          movementReleaseGate.left = false;
        }
      }
      if (key === 'arrowright' || key === 'd') {
        if (isDown) {
          if (!movementReleaseGate.right) input.right = true;
        } else {
          input.right = false;
          movementReleaseGate.right = false;
        }
      }
    }

    function handleMobileEscape() {
      if ((player.form === 'chest' && (hasChestMoveTarget() || chestPossessTransition.active)) || chestReleaseTransition.active) return;
      if (isHeroEngagementActive() && player.form === 'chest' && heroEngagement.turn !== 'player') return;

      if (player.form === 'chest' && mountedMenu.open) {
        if (mountedMenu.mode === 'ambush_select') {
          openMountedActionMenu();
          return;
        }
        if (mountedMenu.mode === 'target_select') {
          beginMountedAmbushMenu();
          return;
        }
        if (mountedMenu.mode === 'menu') {
          if (!isChestHidden()) closeMountedActionMenu();
          return;
        }
      }

      clearRecallCharge();
    }

    function handleMobileSpace() {
      if ((player.form === 'chest' && (hasChestMoveTarget() || chestPossessTransition.active)) || chestReleaseTransition.active) return;
      if (player.form === 'chest') {
        if (isHeroEngagementActive() && heroEngagement.turn !== 'player') return;
        if (mountedMenu.open) {
          if (mountedMenu.mode === 'menu') { confirmTurnMenuSelection(performance.now()); return; }
          if (mountedMenu.mode === 'ambush_select') { confirmMountedAmbushSelection(performance.now()); return; }
          if (mountedMenu.mode === 'target_select') { confirmMountedTargetSelection(); return; }
          if (mountedMenu.mode === 'ambush_roll' && !mountedMenu.ambushDieRolling) { startMountedAmbushRoll(performance.now()); return; }
          if (mountedMenu.mode === 'ambush_result') { finalizeMountedAmbushOutcome(performance.now()); return; }
        }
        openMountedActionMenu();
        return;
      }

      if (player.form === 'shadow') {
        const now = performance.now();
        const interactionTarget = getCurrentInteractionTarget();
        if (interactionTarget) {
          clearSelectedTree();
          if (interactionTarget.type === 'chest') { mountChest(); return; }
          if (interactionTarget.type === 'monster') { tryInteractWithMonster(); return; }
          if (interactionTarget.type === 'pickupAcorn') { collectLooseAcornAt(interactionTarget.x, interactionTarget.y, now); return; }
          if (interactionTarget.type === 'acorn') { plantAcornAt(interactionTarget.x, interactionTarget.y, now); return; }
          if (interactionTarget.type === 'tile') { placeHeldTile(); return; }
        }

        const facingTree = getFacingTreeTarget(now);
        if (facingTree) {
          if (player.selectedTreeKey === facingTree.key) chopTreeAt(facingTree.x, facingTree.y, now);
          else player.selectedTreeKey = facingTree.key;
          render(now);
          return;
        }

        clearSelectedTree();
        input.space = true;
        player.ghostChargeStartAt = now;
      }
    }

    function handleMobileMenuStep(direction) {
      if ((player.form === 'chest' && (hasChestMoveTarget() || chestPossessTransition.active)) || chestReleaseTransition.active) return;
      if (!mountedMenu.open) return;
      if (mountedMenu.mode === 'menu') {
        moveTurnMenuSelection(direction);
        return;
      }
      if (mountedMenu.mode === 'ambush_select') {
        moveAmbushMenuSelection(direction);
        return;
      }
      if (mountedMenu.mode === 'target_select') {
        cycleMountedTargetSelection(direction);
      }
    }

    window.addEventListener('message', (event) => {
      const data = event.data || {};
      if (!data || typeof data !== 'object') return;
      if (data.type === 'mobile-ready') {
        postMobileControlsState();
        return;
      }
      if (data.type === 'mobile-move') {
        setMobileMovementState(data);
        return;
      }
      if (data.type === 'mobile-clear-move') {
        clearMobileMovementState();
        return;
      }
      if (data.type === 'mobile-space') {
        handleMobileSpace();
        return;
      }
      if (data.type === 'mobile-space-release') {
        clearRecallCharge();
        return;
      }
      if (data.type === 'mobile-escape') {
        handleMobileEscape();
        return;
      }
      if (data.type === 'mobile-select-item') {
        if (!isItemBarOpen()) return;
        setHeldTile(data.equip || null);
        return;
      }
      if (data.type === 'mobile-menu-up') {
        handleMobileMenuStep(-1);
        return;
      }
      if (data.type === 'mobile-menu-down') {
        handleMobileMenuStep(1);
        return;
      }
    });

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      const movementKeys = ['arrowup', 'arrowdown', 'arrowleft', 'arrowright', 'w', 'a', 's', 'd'];
      const uiKeys = ['f', 'escape', '1', '2', '3', '4', '5', ' ', 'f9'];

      if ([...movementKeys, ...uiKeys].includes(key)) {
        e.preventDefault();
      }

      if (key === 'f9' && !e.repeat) {
        createDebugForestAroundPlayer(performance.now());
        return;
      }

      if ((player.form === 'chest' && (hasChestMoveTarget() || chestPossessTransition.active)) || chestReleaseTransition.active) {
        return;
      }

      if (isHeroEngagementActive() && player.form === 'chest' && heroEngagement.turn !== 'player') {
        return;
      }

      if (player.form === 'chest' && mountedMenu.open) {
        if (mountedMenu.mode === 'ambush_select') {
          if ((key === 'arrowup' || key === 'w') && !e.repeat) return moveAmbushMenuSelection(-1);
          if ((key === 'arrowdown' || key === 's') && !e.repeat) return moveAmbushMenuSelection(1);
          if (key === 'escape' && !e.repeat) { openMountedActionMenu(); return; }
        }
        if (mountedMenu.mode === 'target_select') {
          if (key === 'escape' && !e.repeat) { beginMountedAmbushMenu(); return; }
          if (key === 'arrowup' || key === 'w') return moveMountedTargetSelection(0, -1);
          if (key === 'arrowdown' || key === 's') return moveMountedTargetSelection(0, 1);
          if (key === 'arrowleft' || key === 'a') return moveMountedTargetSelection(-1, 0);
          if (key === 'arrowright' || key === 'd') return moveMountedTargetSelection(1, 0);
        }
        if (mountedMenu.mode === 'ambush_roll') {
          if (key === ' ' && !e.repeat && !mountedMenu.ambushDieRolling) { startMountedAmbushRoll(performance.now()); return; }
          return;
        }
        if (mountedMenu.mode === 'ambush_result') {
          if (key === ' ' && !e.repeat) { finalizeMountedAmbushOutcome(performance.now()); return; }
          return;
        }
        if (mountedMenu.mode === 'menu') {
          if ((key === 'arrowup' || key === 'w') && !e.repeat) { moveTurnMenuSelection(-1); return; }
          if ((key === 'arrowdown' || key === 's') && !e.repeat) { moveTurnMenuSelection(1); return; }
          if (key === 'escape' && !e.repeat) {
            if (isChestHidden()) return;
            closeMountedActionMenu();
            return;
          }
        }
      }

      if (key === ' ' && !e.repeat) {
        if (player.form === 'chest') {
          if (isHeroEngagementActive() && heroEngagement.turn !== 'player') return;
          if (mountedMenu.open) {
            if (mountedMenu.mode === 'menu') {
              confirmTurnMenuSelection(performance.now());
              return;
            }
            if (mountedMenu.mode === 'ambush_select') {
              confirmMountedAmbushSelection(performance.now());
              return;
            }
            if (mountedMenu.mode === 'target_select') {
              confirmMountedTargetSelection();
              return;
            }
            if (mountedMenu.mode === 'ambush_roll' && !mountedMenu.ambushDieRolling) {
              startMountedAmbushRoll(performance.now());
              return;
            }
            if (mountedMenu.mode === 'ambush_result') {
              finalizeMountedAmbushOutcome(performance.now());
              return;
            }
          }
          openMountedActionMenu();
          return;
        }

        if (player.form === 'shadow') {
          const now = performance.now();
          const interactionTarget = getCurrentInteractionTarget();
          if (interactionTarget) {
            clearSelectedTree();
            if (interactionTarget.type === 'chest') {
              mountChest();
              return;
            }

            if (interactionTarget.type === 'monster') {
              tryInteractWithMonster();
              return;
            }

            if (interactionTarget.type === 'pickupAcorn') {
              collectLooseAcornAt(interactionTarget.x, interactionTarget.y, now);
              return;
            }

            if (interactionTarget.type === 'acorn') {
              plantAcornAt(interactionTarget.x, interactionTarget.y, now);
              return;
            }

            if (interactionTarget.type === 'tile') {
              placeHeldTile();
              return;
            }
          }

          const facingTree = getFacingTreeTarget(now);
          if (facingTree) {
            if (player.selectedTreeKey === facingTree.key) {
              chopTreeAt(facingTree.x, facingTree.y, now);
            } else {
              player.selectedTreeKey = facingTree.key;
            }
            render(now);
            return;
          }

          clearSelectedTree();
          input.space = true;
          player.ghostChargeStartAt = now;
          return;
        }
      }

      if (isItemBarOpen()) {
        if (key === '1' && !e.repeat) return setHeldTile(null);
        if (key === '2' && !e.repeat) return setHeldTile('grass');
        if (key === '3' && !e.repeat) return setHeldTile('dirt');
        if (key === '4' && !e.repeat) return setHeldTile('water');
        if (key === '5' && !e.repeat) return setHeldTile('acorn');
      }

      setMovementKey(key, true);
    });

    window.addEventListener('keyup', (e) => {
      const key = e.key.toLowerCase();
      if (key === ' ') {
        clearRecallCharge();
        return;
      }
      setMovementKey(key, false);
    });

    window.addEventListener('blur', () => {
      input.up = false;
      input.down = false;
      input.left = false;
      input.right = false;
      movementReleaseGate.up = false;
      movementReleaseGate.down = false;
      movementReleaseGate.left = false;
      movementReleaseGate.right = false;
      clearRecallCharge();
      clearMobileMovementState();
      postMobileControlsState();
    });

    window.addEventListener('resize', postMobileControlsState);
    window.addEventListener('orientationchange', postMobileControlsState);
    if (mobileControlsFrame) {
      mobileControlsFrame.addEventListener('load', () => {
        postMobileControlsState();
      });
    }

    let lastTime = performance.now();

    function frame(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.05);
      lastTime = now;
      const environmentNow = getEnvironmentNow(now);
      cleanupExpiredLooseAcorns(now);
      updateCollectedAcornEffects(now);
      updateFloatingTexts(now);
      updateRecallCharge(now);
      updateHeroCameraPan(dt);
      updatePlayer(dt);
      updateHeroEncounters(dt, now);
      isChestBiteAnimationActive(now);
      updateHeroAmbushRollAnimation(now);
      updateMountedAmbushRollAnimation(now);
      updateEncounterBannerState(now);
      if (
        isHeroEngagementActive()
        && heroEngagement.turn === 'hero'
        && !heroEngagement.transition
        && !encounterBannerText
        && heroEngagement.mode !== 'banner'
      ) {
        queueHeroTurnStep(now);
      }
      updateHeroEngagementTransition(now);
      if (!isEnvironmentPaused()) {
        updateMonsters(dt, environmentNow);
      }
      render(now);
      requestAnimationFrame(frame);
    }

    render();
    requestAnimationFrame(frame);
  </script>
</body>
