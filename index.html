        { x: chestTile.x, y: chestTile.y + 1 },
        { x: chestTile.x, y: chestTile.y - 1 },
      ];
    }

    function isHeroActionTargetTile(x, y, attack = null) {
      return getHeroActionTargetTiles(attack).some((tile) => tile.x === x && tile.y === y);
    }

    function beginHeroTargetSelection() {
      const attack = mountedMenu.ambushAttack || HERO_AMBUSH_ATTACKS[mountedMenu.ambushMenuIndex] || HERO_AMBUSH_ATTACKS[0];
      const hero = isHeroEngagementActive() ? heroEngagement.hero : null;
      const validTiles = getHeroActionTargetTiles(attack);
      let startTile = validTiles[0] || getCurrentChestTile();
      if (hero) {
        const hx = Math.floor(hero.x);
        const hy = Math.floor(hero.y);
        const heroTile = validTiles.find((tile) => tile.x === hx && tile.y === hy);
        if (heroTile) startTile = heroTile;
      }
      mountedMenu.targetCursorX = startTile.x;
      mountedMenu.targetCursorY = startTile.y;
      mountedMenu.mode = 'target_select';
    }

    function moveMountedTargetSelection(dx, dy) {
      if (!isMountedMenuActive()) return false;
      if (mountedMenu.mode !== 'target_select') return false;
      const chestTile = getCurrentChestTile();
      let nextX = mountedMenu.targetCursorX;
      let nextY = mountedMenu.targetCursorY;

      if (dx > 0) {
        nextX = chestTile.x + 1;
        nextY = chestTile.y;
      } else if (dx < 0) {
        nextX = chestTile.x - 1;
        nextY = chestTile.y;
      } else if (dy > 0) {
        nextX = chestTile.x;
        nextY = chestTile.y + 1;
      } else if (dy < 0) {
        nextX = chestTile.x;
        nextY = chestTile.y - 1;
      }

      if (!isHeroActionTargetTile(nextX, nextY, mountedMenu.ambushAttack)) return false;
      mountedMenu.targetCursorX = nextX;
      mountedMenu.targetCursorY = nextY;
      return true;
    }

    function cycleMountedTargetSelection(direction) {
      if (!isMountedMenuActive()) return false;
      if (mountedMenu.mode !== 'target_select') return false;
      const validTiles = getHeroActionTargetTiles(mountedMenu.ambushAttack);
      if (!validTiles.length) return false;
      const currentIndex = validTiles.findIndex((tile) => tile.x === mountedMenu.targetCursorX && tile.y === mountedMenu.targetCursorY);
      const startIndex = currentIndex >= 0 ? currentIndex : 0;
      const nextIndex = (startIndex + direction + validTiles.length) % validTiles.length;
      mountedMenu.targetCursorX = validTiles[nextIndex].x;
      mountedMenu.targetCursorY = validTiles[nextIndex].y;
      return true;
    }

    function resolveMountedBiteTarget(now = performance.now()) {
      if (!isMountedMenuActive()) return false;
      const attack = mountedMenu.ambushAttack;
      if (!attack) return false;

      const targetX = mountedMenu.ambushTargetX;
      const targetY = mountedMenu.ambushTargetY;
      const targetKey = keyOf(targetX, targetY);
      const hero = monsters.find((monster) => monster.type === 'heroWanderer' && Math.floor(monster.x) === targetX && Math.floor(monster.y) === targetY) || null;
      const totalDamage = hero ? getHeroAttackDamage(attack, targetX, targetY, hero) : attack.baseDamage;
      const hitHero = !!hero;
      const hitTree = !hitHero && treeState.has(targetKey);

      let pendingEffect = { kind: 'miss', targetX, targetY, totalDamage };
      if (hitHero) {
        pendingEffect = { kind: 'hero', hero, targetX, targetY, totalDamage };
      } else if (hitTree) {
        pendingEffect = { kind: 'tree', targetX, targetY, totalDamage };
      }

      startChestBiteAnimation(player.x, player.y, now, pendingEffect);

      mountedMenu.ambushRoll = null;
      mountedMenu.ambushTotalDamage = totalDamage;
      mountedMenu.ambushOutcome = null;
      mountedMenu.ambushResultText = '';
      mountedMenu.ambushDieFace = 1;
      mountedMenu.ambushDieRolling = false;
      mountedMenu.ambushDieRollStartedAt = 0;
      mountedMenu.ambushPendingRoll = null;
      mountedMenu.ambushResultUntil = now + Math.max(380, CHEST_BITE_ANIM_DURATION + CHEST_BITE_RESULT_HOLD_MS);
      mountedMenu.mode = 'ambush_result';
      return true;
    }

    function confirmMountedTargetSelection(now = performance.now()) {
      if (!isMountedMenuActive()) return false;
      if (mountedMenu.mode !== 'target_select') return false;
      mountedMenu.ambushTargetX = mountedMenu.targetCursorX;
      mountedMenu.ambushTargetY = mountedMenu.targetCursorY;
      return resolveMountedBiteTarget(now);
    }

    function startMountedAmbushRoll(now = performance.now()) {
      return false;
    }

    function resolveMountedAmbushRoll() {
      return false;
    }

    function updateMountedAmbushRollAnimation(now = performance.now()) {
      if (!isMountedMenuActive()) return;
      if (mountedMenu.mode !== 'ambush_result') return;
      if (mountedMenu.ambushResultUntil && now >= mountedMenu.ambushResultUntil) {
        finalizeMountedAmbushOutcome(now);
      }
    }

    function finalizeMountedAmbushOutcome(now = performance.now()) {
      if (!isMountedMenuActive()) return false;
      if (mountedMenu.mode !== 'ambush_result') return false;
      heroEngagement.ambushOpening = false;
      const hero = heroEngagement.hero || monsters.find((monster) => monster.type === 'heroWanderer' && Math.floor(monster.x) === mountedMenu.ambushTargetX && Math.floor(monster.y) === mountedMenu.ambushTargetY) || null;
      if (mountedMenu.ambushOutcome === 'kill') {
        closeMountedActionMenu();
        if (hero) hero.hp = 0;
        if (isHeroEngagementActive()) {
          heroEngagement.turn = 'hero';
          heroEngagement.mode = 'banner';
          showEncounterBanner(`${hero?.heroName || 'Wanderer'} was defeated!`, now, 'finish_ambush');
          return true;
        }
        if (hero) {
          const idx = monsters.indexOf(hero);
          if (idx >= 0) monsters.splice(idx, 1);
        }
        return true;
      }
      if (hero && mountedMenu.ambushOutcome === 'survive') {
        hero.mode = 'flee';
        hero.sawChest = false;
      }
      return endMountedPlayerTurn(now);
    }

    function confirmMountedAmbushSelection(now = performance.now()) {
      if (!isMountedMenuActive()) return false;
      if (mountedMenu.mode !== 'ambush_select') return false;
      const options = getCurrentActionOptions();
      const option = options[mountedMenu.ambushMenuIndex];
      if (!option || option.disabled) return false;
      if (heroEngagement.ambushOpening && (option.kind === 'hide' || option.kind === 'reveal')) return false;
      if (option.kind === 'hide') {
        player.hiddenInChest = true;
        heroEngagement.ambushOpening = false;
        return endMountedPlayerTurn(now);
      }
      if (option.kind === 'reveal') {
        player.hiddenInChest = false;
        heroEngagement.ambushOpening = false;
        return endMountedPlayerTurn(now);
      }
      heroEngagement.ambushOpening = false;
      mountedMenu.ambushAttack = option;
      beginHeroTargetSelection();
      return true;
    }

    function moveHeroTargetSelection(dx, dy) {
      if (!isHeroEngagementActive()) return false;
      if (heroEngagement.mode !== 'target_select') return false;
      const chestTile = getCurrentChestTile();
      let nextX = heroEngagement.targetCursorX;
      let nextY = heroEngagement.targetCursorY;

      if (dx > 0) {
        nextX = chestTile.x + 1;
        nextY = chestTile.y;
      } else if (dx < 0) {
        nextX = chestTile.x - 1;
        nextY = chestTile.y;
      } else if (dy > 0) {
        nextX = chestTile.x;
        nextY = chestTile.y + 1;
      } else if (dy < 0) {
        nextX = chestTile.x;
        nextY = chestTile.y - 1;
      }

      if (!isHeroActionTargetTile(nextX, nextY, heroEngagement.ambushAttack)) return false;
      heroEngagement.targetCursorX = nextX;
      heroEngagement.targetCursorY = nextY;
      return true;
    }

    function confirmAmbushSelection() {
      if (!isHeroEngagementActive()) return false;
      if (heroEngagement.mode !== 'ambush_select') return false;
      const options = getHeroActionOptions();
      const option = options[heroEngagement.ambushMenuIndex];
      if (!option || option.disabled) return false;
      if (heroEngagement.ambushOpening && (option.kind === 'hide' || option.kind === 'reveal')) return false;
      if (option.kind === 'hide') {
        player.hiddenInChest = true;
        heroEngagement.ambushOpening = false;
        heroEngagement.menuOpen = false;
        heroEngagement.playerActionUsed = true;
        heroEngagement.mode = 'hero_turn';
        heroEngagement.turn = 'hero';
        heroEngagement.pendingPlayerStep = null;
        return true;
      }
      if (option.kind === 'reveal') {
        player.hiddenInChest = false;
        heroEngagement.ambushOpening = false;
        heroEngagement.playerActionUsed = true;
        heroEngagement.ambushMenuIndex = 0;
        heroEngagement.mode = 'menu';
        heroEngagement.menuOpen = true;
        heroEngagement.pendingPlayerStep = null;
        clampTurnMenuIndex();
        return true;
      }
      heroEngagement.ambushAttack = option;
      beginHeroTargetSelection();
      return true;
    }

    function finalizeHeroAmbushOutcome(now = performance.now()) {
      if (!isHeroEngagementActive()) return false;
      if (heroEngagement.mode !== 'ambush_result') return false;
      const hero = heroEngagement.hero;
      if (!hero) return false;
      if (heroEngagement.ambushOutcome === 'kill') {
        heroEngagement.ambushOpening = false;
        showEncounterBanner(`${hero.heroName} was defeated!`, now, 'finish_ambush');
      } else if (heroEngagement.ambushOutcome === 'survive') {
        heroEngagement.ambushOpening = false;
        hero.mode = 'flee';
        hero.sawChest = false;
        showEncounterBanner(`${hero.heroName} survived and fled!`, now, 'finish_ambush');
      } else {
        heroEngagement.ambushOpening = false;
        heroEngagement.playerActionUsed = true;
        heroEngagement.mode = 'hero_turn';
        heroEngagement.turn = 'hero';
        heroEngagement.pendingPlayerStep = null;
        queueHeroTurnStep(now);
        return true;
      }
      heroEngagement.mode = 'banner';
      return true;
    }

    function confirmHeroTargetSelection() {
      if (!isHeroEngagementActive()) return false;
      if (heroEngagement.mode !== 'target_select') return false;
      if (!isHeroActionTargetTile(heroEngagement.targetCursorX, heroEngagement.targetCursorY, heroEngagement.ambushAttack)) return false;
      heroEngagement.ambushTargetX = heroEngagement.targetCursorX;
      heroEngagement.ambushTargetY = heroEngagement.targetCursorY;
      heroEngagement.mode = 'ambush_roll';
      heroEngagement.ambushDieFace = 1;
      heroEngagement.ambushDieRolling = false;
      heroEngagement.ambushDieRollStartedAt = 0;
      heroEngagement.ambushPendingRoll = null;
      return true;
    }

    function startHeroAmbushRoll(now = performance.now()) {
      if (!isHeroEngagementActive()) return false;
      if (heroEngagement.mode !== 'ambush_roll') return false;
      if (heroEngagement.ambushDieRolling) return false;
      heroEngagement.ambushPendingRoll = getHeroAttackDamage(
        heroEngagement.ambushAttack,
        heroEngagement.ambushTargetX,
        heroEngagement.ambushTargetY,
        heroEngagement.hero
      );
      heroEngagement.ambushDieRolling = true;
      heroEngagement.ambushDieRollStartedAt = now;
      heroEngagement.ambushDieFace = 1 + Math.floor(Math.random() * 3);
      return true;
    }

    function resolveHeroAmbushRoll() {
      if (!isHeroEngagementActive()) return false;
      if (heroEngagement.mode !== 'ambush_roll') return false;
      if (!heroEngagement.ambushDieRolling || heroEngagement.ambushPendingRoll == null) return false;
      const hero = heroEngagement.hero;
      const attack = heroEngagement.ambushAttack;
      if (!attack) return false;
      const totalDamage = heroEngagement.ambushPendingRoll;
      const heroTileX = hero ? Math.floor(hero.x) : null;
      const heroTileY = hero ? Math.floor(hero.y) : null;
      const hitHero = !!hero && heroTileX === heroEngagement.ambushTargetX && heroTileY === heroEngagement.ambushTargetY;
      if (hitHero) {
        hero.hp = Math.max(0, (hero.hp == null ? 5 : hero.hp) - totalDamage);
      }
      heroEngagement.ambushRoll = null;
      heroEngagement.ambushTotalDamage = totalDamage;
      heroEngagement.ambushOutcome = hitHero ? (hero.hp <= 0 ? 'kill' : 'survive') : 'miss';
      heroEngagement.ambushResultText = !hitHero
        ? `${attack.label}! Miss.`
        : `${attack.label}! ${totalDamage} damage. ${heroEngagement.ambushOutcome === 'kill' ? `${hero.heroName} was defeated!` : `${hero.heroName} survives with ${hero.hp} HP and runs.`}`;
      heroEngagement.ambushDieFace = totalDamage >= HERO_SURPRISE_BITE_DAMAGE ? 3 : 1;
      heroEngagement.ambushDieRolling = false;
      heroEngagement.ambushDieRollStartedAt = 0;
      heroEngagement.ambushPendingRoll = null;
      heroEngagement.mode = 'ambush_result';
      return true;
    }

    function updateHeroAmbushRollAnimation(now = performance.now()) {
      if (!isHeroEngagementActive()) return;
      if (heroEngagement.mode !== 'ambush_roll') return;
      if (!heroEngagement.ambushDieRolling) return;
      const elapsed = now - heroEngagement.ambushDieRollStartedAt;
      const frame = Math.floor(elapsed / AMBUSH_DIE_FACE_INTERVAL);
      heroEngagement.ambushDieFace = 1 + (frame % 3);
      if (elapsed >= AMBUSH_DIE_ROLL_DURATION) {
        resolveHeroAmbushRoll();
      }
    }

    function drawAmbushDie(x, y, size, value, isRolling = false) {
      const pipLayouts = {
        1: [[0, 0]],
        2: [[-1, -1], [1, 1]],
        3: [[-1, -1], [0, 0], [1, 1]],
      };
      const pips = pipLayouts[value] || pipLayouts[1];
      const pipRadius = Math.max(4, Math.floor(size * 0.08));
      const pipOffset = Math.floor(size * 0.24);
      ctx.save();
      if (isRolling) {
        const wobble = Math.sin(performance.now() / 28) * 0.08;
        ctx.translate(x + size / 2, y + size / 2);
        ctx.rotate(wobble);
        ctx.translate(-(x + size / 2), -(y + size / 2));
      }
      ctx.fillStyle = isRolling ? '#fff6d9' : '#ffffff';
      ctx.fillRect(x, y, size, size);
      ctx.strokeStyle = 'rgba(0,0,0,0.72)';
      ctx.lineWidth = 3;
      ctx.strokeRect(x + 0.5, y + 0.5, size - 1, size - 1);
      ctx.fillStyle = '#111111';
      for (const [gx, gy] of pips) {
        const px = x + size / 2 + gx * pipOffset;
        const py = y + size / 2 + gy * pipOffset;
        ctx.beginPath();
        ctx.arc(px, py, pipRadius, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function findHeroPath(startTile, targetTiles, treeTiles, ignoreMonster = null) {
      if (!startTile || !targetTiles || !targetTiles.length) return null;
      const startKey = keyOf(startTile.x, startTile.y);
      const targetKeys = new Set(targetTiles.map((tile) => keyOf(tile.x, tile.y)));
      if (targetKeys.has(startKey)) return [startTile];

      const queue = [startTile];
      const cameFrom = new Map();
      cameFrom.set(startKey, null);

      while (queue.length) {
        const current = queue.shift();
        for (const dir of directionOrder) {
          const next = { x: current.x + dir.dx, y: current.y + dir.dy };
          const nextKey = keyOf(next.x, next.y);
          if (cameFrom.has(nextKey)) continue;
          if (!isMonsterTileWalkable(next.x, next.y, treeTiles, ignoreMonster)) continue;
          cameFrom.set(nextKey, current);
          if (targetKeys.has(nextKey)) {
            const path = [next];
            let walk = current;
            while (walk) {
              path.push(walk);
              const walkKey = keyOf(walk.x, walk.y);
              walk = cameFrom.get(walkKey);
            }
            path.reverse();
            return path;
          }
          queue.push(next);
        }
      }

      return null;
    }

    function getSpawnSideForCandidate(candidate, bounds) {
      if (candidate.x <= bounds.minX - 1) return 'left';
      if (candidate.x >= bounds.maxX + 1) return 'right';
      if (candidate.y <= bounds.minY - 1) return 'top';
      return 'bottom';
    }

    function getOppositeSpawnSide(side) {
      if (side === 'left') return 'right';
      if (side === 'right') return 'left';
      if (side === 'top') return 'bottom';
      return 'top';
    }

    function getHeroMidTargets(bounds, treeTiles, hero = null) {
      const targets = [];
      const centerX = Math.floor((bounds.minX + bounds.maxX) / 2);
      const centerY = Math.floor((bounds.minY + bounds.maxY) / 2);
      for (let radius = 0; radius <= 4; radius += 1) {
        for (let dy = -radius; dy <= radius; dy += 1) {
          for (let dx = -radius; dx <= radius; dx += 1) {
            if (Math.abs(dx) + Math.abs(dy) !== radius) continue;
            const x = centerX + dx;
            const y = centerY + dy;
            if (!hasTile(x, y)) continue;
            if (!isMonsterTileWalkable(x, y, treeTiles, hero)) continue;
            targets.push({ x, y });
          }
        }
      }
      return targets;
    }

    function getHeroEscapeTargets(bounds, spawnSide, treeTiles, hero = null) {
      const oppositeSide = getOppositeSpawnSide(spawnSide);
      const targets = [];
      if (oppositeSide === 'left' || oppositeSide === 'right') {
        const x = oppositeSide === 'left' ? bounds.minX - 1 : bounds.maxX + 1;
        const centerY = Math.floor((bounds.minY + bounds.maxY) / 2);
        for (let offset = 0; offset <= Math.max(bounds.maxY - bounds.minY, 8); offset++) {
          for (const sign of [0, -1, 1]) {
            const y = centerY + (offset === 0 ? 0 : offset * sign);
            if (!hasTile(x, y)) continue;
            if (!isMonsterTileWalkable(x, y, treeTiles, hero)) continue;
            targets.push({ x, y });
          }
        }
      } else {
        const y = oppositeSide === 'top' ? bounds.minY - 1 : bounds.maxY + 1;
        const centerX = Math.floor((bounds.minX + bounds.maxX) / 2);
        for (let offset = 0; offset <= Math.max(bounds.maxX - bounds.minX, 8); offset++) {
          for (const sign of [0, -1, 1]) {
            const x = centerX + (offset === 0 ? 0 : offset * sign);
            if (!hasTile(x, y)) continue;
            if (!isMonsterTileWalkable(x, y, treeTiles, hero)) continue;
            targets.push({ x, y });
          }
        }
      }
      return targets;
    }

    function assignHeroEscapePlan(hero, bounds, chosen, treeTiles) {
      const startTile = { x: chosen.stepX, y: chosen.stepY };
      const spawnSide = getSpawnSideForCandidate(chosen, bounds);
      const midTargets = getHeroMidTargets(bounds, treeTiles, hero).filter((tile) => !(tile.x === startTile.x && tile.y === startTile.y));
      const exitTargets = getHeroEscapeTargets(bounds, spawnSide, treeTiles, hero);
      let fullPath = null;

      if (midTargets.length) {
        const pathToMid = findHeroPath(startTile, midTargets, treeTiles, hero);
        if (pathToMid && pathToMid.length >= 2) {
          const midTile = pathToMid[pathToMid.length - 1];
          const pathToExit = findHeroPath(midTile, exitTargets.filter((tile) => !(tile.x === midTile.x && tile.y === midTile.y)), treeTiles, hero);
          if (pathToExit && pathToExit.length >= 2) {
            fullPath = pathToMid.concat(pathToExit.slice(1));
          }
        }
      }

      if (!fullPath) {
        const directPath = findHeroPath(startTile, exitTargets, treeTiles, hero);
        if (!directPath || directPath.length < 2) return false;
        fullPath = directPath;
      }

      hero.escapePath = fullPath;
      hero.escapePathIndex = 0;
      hero.escapeTarget = fullPath[fullPath.length - 1];
      hero.spawnSide = spawnSide;
      return true;
    }

    function ensureHeroEscapePath(hero, now = performance.now()) {
      if (hero.escapePath && hero.escapePathIndex < hero.escapePath.length - 1) return true;
      const treeTiles = getActiveTreeTiles(now);
      const bounds = getVisibleBounds();
      const currentTile = { x: Math.floor(hero.x), y: Math.floor(hero.y) };
      const targets = getHeroEscapeTargets(bounds, hero.spawnSide || 'left', treeTiles, hero).filter((tile) => !(tile.x === currentTile.x && tile.y === currentTile.y));
      const path = findHeroPath(currentTile, targets, treeTiles, hero);
      if (!path || path.length < 2) return false;
      hero.escapePath = path;
      hero.escapePathIndex = 0;
      hero.escapeTarget = path[path.length - 1];
      return true;
    }

    function queueHeroTurnStep(now = performance.now()) {
      if (!isHeroEngagementActive()) return;
      const hero = heroEngagement.hero;
      if (hero.entering || hero.mode === 'alert' || hero.turnTargetX != null || hero.turnTargetY != null) return;
      if (hero.mode === 'approach' && startHeroAmbush(now)) return;

      const ensurePath = hero.mode === 'approach' ? ensureHeroApproachPath : ensureHeroEscapePath;
      if (!ensurePath(hero, now)) {
        if (hero.mode === 'flee') beginHeroRanAway(now);
        else {
          handControlToPlayerDuringHeroEncounter();
        }
        return;
      }

      const currentTileX = Math.floor(hero.x);
      const currentTileY = Math.floor(hero.y);
      const currentPathIndex = hero.escapePath.findIndex((tile) => tile.x === currentTileX && tile.y === currentTileY);
      if (currentPathIndex >= 0) {
        hero.escapePathIndex = currentPathIndex;
      } else {
        hero.escapePath = null;
        hero.escapePathIndex = 0;
        if (!ensurePath(hero, now)) {
          handControlToPlayerDuringHeroEncounter();
          return;
        }
      }

      const nextTile = hero.escapePath[hero.escapePathIndex + 1];
      if (!nextTile) {
        if (hero.mode === 'flee') beginHeroRanAway(now);
        else if (hero.mode === 'approach') {
          if (startHeroAmbush(now)) return;
          handControlToPlayerDuringHeroEncounter();
        } else {
          handControlToPlayerDuringHeroEncounter();
        }
        return;
      }

      const treeTiles = getActiveTreeTiles(now);
      if (!isMonsterTileWalkable(nextTile.x, nextTile.y, treeTiles, hero)) {
        hero.escapePath = null;
        hero.escapePathIndex = 0;
        if (!ensurePath(hero, now)) {
          handControlToPlayerDuringHeroEncounter();
          return;
        }
      }

      const refreshedNext = hero.escapePath[hero.escapePathIndex + 1];
      if (!refreshedNext) {
        if (hero.mode === 'flee') beginHeroRanAway(now);
        else if (hero.mode === 'approach') {
          if (startHeroAmbush(now)) return;
          handControlToPlayerDuringHeroEncounter();
        } else {
          handControlToPlayerDuringHeroEncounter();
        }
        return;
      }
      const startX = currentTileX + 0.5;
      const startY = currentTileY + 0.5;
      hero.x = startX;
      hero.y = startY;
      hero.turnTargetX = refreshedNext.x + 0.5;
      hero.turnTargetY = refreshedNext.y + 0.5;
      hero.moveDirX = Math.sign(refreshedNext.x - currentTileX);
      hero.moveDirY = Math.sign(refreshedNext.y - currentTileY);
      hero.facingX = hero.moveDirX;
      hero.facingY = hero.moveDirY;
      hero.visionFacingX = hero.moveDirX;
      hero.visionFacingY = hero.moveDirY;
      hero.escapePathIndex += 1;
      hero.moving = true;
    }

    function updateHeroEngagementTransition(now = performance.now()) {
      const transition = heroEngagement.transition;
      if (!transition) return;
      const elapsed = now - transition.startedAt;
      if (elapsed < ENGAGEMENT_FADE_MS) return;

      if (transition.phase === 'out') {
        endHeroEngagementImmediate();
        heroEngagement.transition = {
          phase: 'in',
          startedAt: now,
        };
        return;
      }

      heroEngagement.transition = null;
    }


    function getHeroCameraInspectTile() {
      if (!isHeroEngagementActive() || heroEngagement.mode !== 'camera') return null;
      const playerTile = getPlayerTile();
      return {
        x: playerTile.x + heroEngagement.cameraOffsetX,
        y: playerTile.y + heroEngagement.cameraOffsetY,
      };
    }

    function getHeroFacing(hero) {
      if (!hero) return { x: 0, y: 1 };
      const visionFx = Math.sign(hero.visionFacingX || 0);
      const visionFy = Math.sign(hero.visionFacingY || 0);
      if (visionFx !== 0 || visionFy !== 0) return { x: visionFx, y: visionFy };
      const fx = Math.sign(hero.facingX || hero.moveDirX || 0);
      const fy = Math.sign(hero.facingY || hero.moveDirY || 0);
      if (fx !== 0 || fy !== 0) return { x: fx, y: fy };
      return { x: 0, y: 1 };
    }

    function getHeroVisionTiles(hero) {
      if (!hero || hero.type !== 'heroWanderer') return [];
      const originX = Math.floor(hero.x);
      const originY = Math.floor(hero.y);
      const facing = getHeroFacing(hero);
      const tiles = [{ x: originX, y: originY }];
      if (facing.x !== 0) {
        for (let depth = 1; depth <= 3; depth++) {
          const baseX = originX + facing.x * depth;
          const baseY = originY;
          tiles.push(
            { x: baseX, y: baseY },
            { x: baseX, y: baseY - 1 },
            { x: baseX, y: baseY + 1 }
          );
        }
      } else {
        for (let depth = 1; depth <= 3; depth++) {
          const baseX = originX;
          const baseY = originY + facing.y * depth;
          tiles.push(
            { x: baseX, y: baseY },
            { x: baseX - 1, y: baseY },
            { x: baseX + 1, y: baseY }
          );
        }
      }
      const unique = new Map();
      for (const tile of tiles) {
        if (!hasTile(tile.x, tile.y)) continue;
        unique.set(keyOf(tile.x, tile.y), tile);
      }
      return Array.from(unique.values());
    }


    function isTileInHeroVision(hero, x, y) {
      if (!hero || hero.type !== 'heroWanderer') return false;
      return getHeroVisionTiles(hero).some((tile) => tile.x === x && tile.y === y);
    }

    function isHeroSeeingChest(hero) {
      if (!hero || hero.type !== 'heroWanderer') return false;
      if (player.form !== 'chest') return false;
      const chestTile = getCurrentChestTile();
      return isTileInHeroVision(hero, chestTile.x, chestTile.y);
    }

    function isHeroSeeingHiddenChest(hero) {
      if (!hero || hero.type !== 'heroWanderer') return false;
      if (player.form !== 'chest' || !isChestHidden()) return false;
      const chestTile = getCurrentChestTile();
      return isTileInHeroVision(hero, chestTile.x, chestTile.y);
    }

    function isHeroSeeingRevealedChest(hero) {
      if (!hero || hero.type !== 'heroWanderer') return false;
      if (player.form !== 'chest' || isChestHidden()) return false;
      const chestTile = getCurrentChestTile();
      return isTileInHeroVision(hero, chestTile.x, chestTile.y);
    }

    function getHeroChestApproachTargets(treeTiles, hero = null) {
      const chestTile = getCurrentChestTile();
      const chestTileX = chestTile.x;
      const chestTileY = chestTile.y;
      const targets = [];
      for (const dir of directionOrder) {
        const x = chestTileX + dir.dx;
        const y = chestTileY + dir.dy;
        if (!hasTile(x, y)) continue;
        if (!isMonsterTileWalkable(x, y, treeTiles, hero)) continue;
        targets.push({ x, y });
      }
      return targets;
    }

    function ensureHeroApproachPath(hero, now = performance.now()) {
      const treeTiles = getActiveTreeTiles(now);
      const currentTile = { x: Math.floor(hero.x), y: Math.floor(hero.y) };
      const targets = getHeroChestApproachTargets(treeTiles, hero);
      if (!targets.length) return false;
      if (targets.some((tile) => tile.x === currentTile.x && tile.y === currentTile.y)) {
        hero.escapePath = [currentTile];
        hero.escapePathIndex = 0;
        hero.escapeTarget = currentTile;
        return true;
      }
      const path = findHeroPath(currentTile, targets, treeTiles, hero);
      if (!path || !path.length) return false;
      hero.escapePath = path;
      hero.escapePathIndex = 0;
      hero.escapeTarget = path[path.length - 1];
      return true;
    }

    function getHeroImmediateExitTargets(bounds, treeTiles, hero = null) {
      const targets = [];
      const centerX = Math.floor((bounds.minX + bounds.maxX) / 2);
      const centerY = Math.floor((bounds.minY + bounds.maxY) / 2);
      const edges = [
        { side: 'left', x: bounds.minX - 1, y: centerY, axis: 'y' },
        { side: 'right', x: bounds.maxX + 1, y: centerY, axis: 'y' },
        { side: 'top', x: centerX, y: bounds.minY - 1, axis: 'x' },
        { side: 'bottom', x: centerX, y: bounds.maxY + 1, axis: 'x' },
      ];
      for (const edge of edges) {
        const limit = edge.axis === 'y' ? Math.max(bounds.maxY - bounds.minY, 8) : Math.max(bounds.maxX - bounds.minX, 8);
        for (let offset = 0; offset <= limit; offset += 1) {
          for (const sign of [0, -1, 1]) {
            const x = edge.axis === 'y' ? edge.x : edge.x + (offset === 0 ? 0 : offset * sign);
            const y = edge.axis === 'y' ? edge.y + (offset === 0 ? 0 : offset * sign) : edge.y;
            if (!hasTile(x, y)) continue;
            if (!isMonsterTileWalkable(x, y, treeTiles, hero)) continue;
            targets.push({ x, y });
          }
        }
      }
      return targets;
    }

    function triggerHeroVisionReaction(now = performance.now()) {
      if (!isHeroEngagementActive()) return false;
      const hero = heroEngagement.hero;
      if (!hero || hero.type !== 'heroWanderer') return false;

      hero.turnTargetX = null;
      hero.turnTargetY = null;
      hero.moving = false;
      heroEngagement.menuOpen = false;
      heroEngagement.pendingPlayerStep = null;
      heroEngagement.cameraOffsetX = 0;
      heroEngagement.cameraOffsetY = 0;
      heroEngagement.turn = 'hero';
      heroEngagement.mode = 'hero_turn';

      if (isHeroSeeingHiddenChest(hero)) {
        hero.mode = 'approach';
        hero.sawChest = true;
        hero.escapePath = null;
        hero.escapePathIndex = 0;
        hero.escapeTarget = null;
        return true;
      }

      if (isHeroSeeingRevealedChest(hero)) {
        const bounds = getVisibleBounds();
        const treeTiles = getActiveTreeTiles(now);
        const currentTile = { x: Math.floor(hero.x), y: Math.floor(hero.y) };
        const targets = getHeroImmediateExitTargets(bounds, treeTiles, hero).filter((tile) => !(tile.x === currentTile.x && tile.y === currentTile.y));
        const path = findHeroPath(currentTile, targets, treeTiles, hero);
        hero.mode = 'flee';
        hero.sawChest = false;
        if (path && path.length >= 2) {
          hero.escapePath = path;
          hero.escapePathIndex = 0;
          hero.escapeTarget = path[path.length - 1];
        } else {
          hero.escapePath = [{ x: currentTile.x, y: currentTile.y }];
          hero.escapePathIndex = 0;
          hero.escapeTarget = currentTile;
        }
        queueHeroTurnStep(now);
        return true;
      }

      return false;
    }

    function maybeTriggerHeroVisionReactionOnPlayerMove(fromTile, toTile, now = performance.now()) {
      if (!isHeroEngagementActive()) return false;
      const hero = heroEngagement.hero;
      if (!hero || hero.type !== 'heroWanderer') return false;
      if (hero.mode !== 'explore' && hero.mode !== 'approach') return false;
      if (!isHeroSeeingChest(hero)) return false;
      return triggerHeroVisionReaction(now);
    }

    function drawHeroVisionHighlights() {
      if (!isHeroEngagementActive()) return;
      const hero = heroEngagement.hero;
      if (!hero || hero.type !== 'heroWanderer' || (hero.mode !== 'explore' && hero.mode !== 'approach')) return;
      const visionTiles = getHeroVisionTiles(hero);
      if (!visionTiles.length) return;
      ctx.save();
      for (const tile of visionTiles) {
        const screenX = Math.floor(camera.x + tile.x * TILE_SIZE);
        const screenY = Math.floor(camera.y + tile.y * TILE_SIZE);
        ctx.fillStyle = 'rgba(255, 64, 64, 0.16)';
        ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
        ctx.strokeStyle = 'rgba(255, 90, 90, 0.72)';
        ctx.lineWidth = 2;
        ctx.strokeRect(screenX + 1, screenY + 1, TILE_SIZE - 2, TILE_SIZE - 2);
      }
      ctx.restore();
    }

    function drawHeroEngagementGrid(bounds) {
      if (!mountedMenu.open) return;
      if (mountedMenu.mode !== 'ambush_select' && mountedMenu.mode !== 'target_select' && mountedMenu.mode !== 'ambush_roll' && mountedMenu.mode !== 'ambush_result') return;
      ctx.save();
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.10)';
      ctx.lineWidth = 1;
      for (let x = bounds.minX; x <= bounds.maxX + 1; x++) {
        const screenX = Math.floor(camera.x + x * TILE_SIZE) + 0.5;
        ctx.beginPath();
        ctx.moveTo(screenX, 0);
        ctx.lineTo(screenX, canvas.height);
        ctx.stroke();
      }
      for (let y = bounds.minY; y <= bounds.maxY + 1; y++) {
        const screenY = Math.floor(camera.y + y * TILE_SIZE) + 0.5;
        ctx.beginPath();
        ctx.moveTo(0, screenY);
        ctx.lineTo(canvas.width, screenY);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawHeroCameraInspectHighlight() {
      const tile = getHeroCameraInspectTile();
      if (!tile) return;
      const screenX = Math.floor(camera.x + tile.x * TILE_SIZE);
      const screenY = Math.floor(camera.y + tile.y * TILE_SIZE);
      ctx.save();
      ctx.fillStyle = 'rgba(255, 216, 102, 0.14)';
      ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
      ctx.strokeStyle = 'rgba(255, 216, 102, 0.92)';
      ctx.lineWidth = 2;
      ctx.strokeRect(screenX + 1, screenY + 1, TILE_SIZE - 2, TILE_SIZE - 2);
      ctx.restore();
    }

    function drawHeroActionTargetHighlights() {
      if (!isMountedMenuActive() || mountedMenu.mode !== 'target_select') return;
      const validTiles = getHeroActionTargetTiles(mountedMenu.ambushAttack);
      const pulse = 0.5 + 0.5 * Math.sin(performance.now() * 0.014);
      ctx.save();
      for (const tile of validTiles) {
        const screenX = Math.floor(camera.x + tile.x * TILE_SIZE);
        const screenY = Math.floor(camera.y + tile.y * TILE_SIZE);
        const centerX = screenX + TILE_SIZE / 2;
        const centerY = screenY + TILE_SIZE / 2;
        const isCursor = tile.x === mountedMenu.targetCursorX && tile.y === mountedMenu.targetCursorY;

        ctx.fillStyle = isCursor ? 'rgba(255, 216, 102, 0.34)' : 'rgba(255, 216, 102, 0.14)';
        ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);

        if (isCursor) {
          ctx.strokeStyle = 'rgba(255, 245, 190, 1.0)';
          ctx.lineWidth = 4;
          ctx.strokeRect(screenX + 1.5, screenY + 1.5, TILE_SIZE - 3, TILE_SIZE - 3);

          ctx.strokeStyle = `rgba(255, 255, 255, ${0.55 + pulse * 0.4})`;
          ctx.lineWidth = 2;
          ctx.strokeRect(screenX + 5.5, screenY + 5.5, TILE_SIZE - 11, TILE_SIZE - 11);

          const arm = 8 + pulse * 3;
          ctx.strokeStyle = 'rgba(70, 30, 0, 0.9)';
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.moveTo(centerX - arm, centerY);
          ctx.lineTo(centerX + arm, centerY);
          ctx.moveTo(centerX, centerY - arm);
          ctx.lineTo(centerX, centerY + arm);
          ctx.stroke();

          ctx.strokeStyle = 'rgba(255, 255, 255, 0.95)';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(centerX - arm, centerY);
          ctx.lineTo(centerX + arm, centerY);
          ctx.moveTo(centerX, centerY - arm);
          ctx.lineTo(centerX, centerY + arm);
          ctx.stroke();
        } else {
          ctx.strokeStyle = 'rgba(255, 216, 102, 0.92)';
          ctx.lineWidth = 2;
          ctx.strokeRect(screenX + 1, screenY + 1, TILE_SIZE - 2, TILE_SIZE - 2);
        }
      }
      ctx.restore();
    }

    function drawHeroActionMenu() {
      if (!isMountedMenuActive()) return;
      if (mountedMenu.mode !== 'menu') return;
      const options = getMountedMenuOptions();
      const boxW = 200;
      const rowH = 30;
      const boxH = 24 + options.length * rowH + 12;
      const boxX = Math.floor((canvas.width - boxW) / 2);
      const boxY = Math.floor(canvas.height * 0.60);

      ctx.save();
      ctx.fillStyle = 'rgba(0, 0, 0, 0.82)';
      ctx.fillRect(boxX, boxY, boxW, boxH);
      ctx.strokeStyle = 'rgba(255,255,255,0.28)';
      ctx.lineWidth = 2;
      ctx.strokeRect(boxX + 0.5, boxY + 0.5, boxW - 1, boxH - 1);
      ctx.font = 'bold 18px Arial';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';

      options.forEach((option, index) => {
        const rowY = boxY + 22 + index * rowH;
        if (index === mountedMenu.menuIndex) {
          ctx.fillStyle = 'rgba(255, 216, 102, 0.18)';
          ctx.fillRect(boxX + 10, rowY - 12, boxW - 20, 24);
        }
        ctx.fillStyle = option.disabled ? 'rgba(247,241,209,0.38)' : '#f7f1d1';
        ctx.fillText(option.label, boxX + 18, rowY + 1);
      });
      ctx.restore();
    }

    function drawHeroAmbushUi() {
      if (!isMountedMenuActive()) return;
      const state = mountedMenu;
      const ambushMode = state.mode;
      if (ambushMode !== 'ambush_select' && ambushMode !== 'ambush_roll' && ambushMode !== 'ambush_result') return;

      if (ambushMode === 'ambush_select') {
        const options = getCurrentActionOptions();
        const boxW = 220;
        const rowH = 30;
        const boxH = 12 + options.length * rowH + 12;
        const boxX = Math.floor((canvas.width - boxW) / 2);
        const boxY = Math.floor(canvas.height * 0.60);

        ctx.save();
        ctx.fillStyle = 'rgba(0, 0, 0, 0.82)';
        ctx.fillRect(boxX, boxY, boxW, boxH);
        ctx.strokeStyle = 'rgba(255,255,255,0.28)';
        ctx.lineWidth = 2;
        ctx.strokeRect(boxX + 0.5, boxY + 0.5, boxW - 1, boxH - 1);
        ctx.font = 'bold 18px Arial';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';

        options.forEach((option, index) => {
          const rowY = boxY + 22 + index * rowH;
          if (index === getCurrentActionMenuIndex()) {
            ctx.fillStyle = option.disabled ? 'rgba(255, 216, 102, 0.08)' : 'rgba(255, 216, 102, 0.18)';
            ctx.fillRect(boxX + 10, rowY - 12, boxW - 20, 24);
          }
          ctx.fillStyle = option.disabled ? 'rgba(247,241,209,0.38)' : '#f7f1d1';
          ctx.fillText(option.label, boxX + 18, rowY + 1);
        });
        ctx.restore();
        return;
      }

      if (ambushMode !== 'ambush_result') return;
      return;
    }

    function drawTurnHint() {
      if (!isMountedMenuActive()) return;
      if (mountedMenu.open && mountedMenu.mode === 'menu') return;
      const mode = mountedMenu.mode;
      const turn = isHeroEngagementActive() ? heroEngagement.turn : 'player';
      let text = '';
      if (turn === 'player' && mode === 'await_move') {
        text = 'Choose 1 direction';
      }
      if (!text) return;
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.72)';
      ctx.fillRect(12, canvas.height - 42, 170, 28);
      ctx.fillStyle = '#f7f1d1';
      ctx.font = 'bold 16px Arial';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, 22, canvas.height - 28);
      ctx.restore();
    }

    function drawHeroEngagementFade(now = performance.now()) {
      return;
    }

    function hasActiveHero() {
      return monsters.some((monster) => monster.type === 'heroWanderer');
    }

    function trySpawnMountedHeroEncounter(now = performance.now()) {
      if (player.form !== 'chest') return false;
      if (hasActiveHero()) return false;

      updateCamera();
      const bounds = getVisibleBounds();
      const treeTiles = getActiveTreeTiles(now);
      const biomeName = getCurrentBiome(bounds, treeTiles);
      if (biomeName !== 'Forest') return false;
      if (Math.random() > HERO_SPAWN_CHANCE_ON_MOUNTED_MOVE) return false;

      const candidates = getOffscreenSpawnCandidates(bounds, treeTiles);
      if (!candidates.length) return false;

      const chosen = candidates[Math.floor(Math.random() * candidates.length)];
      const hero = {
        type: 'heroWanderer',
        heroName: 'Wanderer',
        x: chosen.stepX + 0.5,
        y: chosen.stepY + 0.5,
        targetX: null,
        targetY: null,
        entering: false,
        moveDirX: chosen.dirX,
        moveDirY: chosen.dirY,
        moving: false,
        animTime: 0,
        alertUntil: 0,
        turnTargetX: null,
        turnTargetY: null,
        escapePath: null,
        escapePathIndex: 0,
        escapeTarget: null,
        spawnSide: null,
        mode: 'explore',
        facingX: chosen.dirX,
        facingY: chosen.dirY,
        visionFacingX: chosen.dirX,
        visionFacingY: chosen.dirY,
        sawChest: false,
        hp: 5,
        maxHp: 5,
      };
      if (!assignHeroEscapePlan(hero, bounds, chosen, treeTiles)) return false;
      monsters.push(hero);
      beginHeroEngagement(hero, now);
      return true;
    }

    function updateHeroEncounters(dt, now) {
      const treeTiles = getActiveTreeTiles(now);

      for (const monster of monsters) {
        if (monster.type !== 'heroWanderer') continue;

        const isCurrentAmbushHero = isHeroEngagementActive()
          && heroEngagement.hero === monster
          && mountedMenu.open
          && (
            mountedMenu.mode === 'ambush_select'
            || mountedMenu.mode === 'target_select'
            || mountedMenu.mode === 'ambush_roll'
            || mountedMenu.mode === 'ambush_result'
          );

        if (monster.mode !== 'alert' && !isCurrentAmbushHero) {
          if ((monster.mode === 'explore' || monster.mode === 'approach') && isHeroSeeingHiddenChest(monster)) {
            monster.mode = 'approach';
            monster.sawChest = true;
            monster.escapePath = null;
            monster.escapePathIndex = 0;
          } else if ((monster.mode === 'explore' || monster.mode === 'approach') && isHeroSeeingRevealedChest(monster)) {
            monster.mode = 'flee';
            monster.sawChest = false;
            monster.turnTargetX = null;
            monster.turnTargetY = null;
            monster.escapePath = null;
            monster.escapePathIndex = 0;
            if (isHeroEngagementActive() && heroEngagement.hero === monster) {
              heroEngagement.turn = 'hero';
              heroEngagement.mode = 'hero_turn';
            }
          } else if (monster.mode === 'approach' && player.form !== 'chest') {
            monster.mode = 'explore';
            monster.sawChest = false;
            monster.escapePath = null;
            monster.escapePathIndex = 0;
          }
        }

        if (monster.entering) {
          const dx = monster.targetX - monster.x;
          const dy = monster.targetY - monster.y;
          const dist = Math.hypot(dx, dy);
          const step = HERO_WANDERER_SPEED * dt;

          if (dist <= step || dist <= 0.0001) {
            monster.x = monster.targetX;
            monster.y = monster.targetY;
            monster.entering = false;
            monster.moving = false;
            continue;
          }

          monster.facingX = Math.sign(dx);
          monster.facingY = Math.sign(dy);
          monster.facingX = Math.sign(dx);
          monster.facingY = Math.sign(dy);
          const nextX = monster.x + (dx / dist) * step;
          const nextY = monster.y + (dy / dist) * step;
          const tx = Math.floor(nextX);
          const ty = Math.floor(nextY);

          if (isMonsterTileWalkable(tx, ty, treeTiles, monster)) {
            monster.x = nextX;
            monster.y = nextY;
            monster.moving = true;
          } else {
            monster.entering = false;
            monster.moving = false;
          }
          continue;
        }

        if (monster.mode === 'alert') {
          monster.moving = false;
          if (now >= (monster.alertUntil || 0)) {
            monster.mode = 'flee';
            if (heroEngagement.hero === monster) {
              queueHeroTurnStep(now);
            }
          }
          continue;
        }

        if (monster.turnTargetX != null && monster.turnTargetY != null) {
          const dx = monster.turnTargetX - monster.x;
          const dy = monster.turnTargetY - monster.y;
          const dist = Math.hypot(dx, dy);
          const step = (monster.mode === 'flee' ? HERO_WANDERER_FLEE_SPEED : HERO_WANDERER_SPEED) * dt;

          if (dist <= step || dist <= 0.0001) {
            monster.x = monster.turnTargetX;
            monster.y = monster.turnTargetY;
            monster.turnTargetX = null;
            monster.turnTargetY = null;
            monster.moving = false;
            if (heroEngagement.hero === monster && heroEngagement.turn === 'hero') {
              if (monster.mode === 'approach') {
                if (!startHeroAmbush(now)) {
                  handControlToPlayerDuringHeroEncounter();
                }
              } else if (monster.escapeTarget && Math.floor(monster.x) === monster.escapeTarget.x && Math.floor(monster.y) === monster.escapeTarget.y) {
                if (monster.mode === 'flee') beginHeroRanAway(now);
                else beginHeroEscape(now);
              } else {
                handControlToPlayerDuringHeroEncounter();
              }
            }
            continue;
          }

          const nextX = monster.x + (dx / dist) * step;
          const nextY = monster.y + (dy / dist) * step;
          const tx = Math.floor(nextX);
          const ty = Math.floor(nextY);
          if (isMonsterTileWalkable(tx, ty, treeTiles, monster)) {
            monster.x = nextX;
            monster.y = nextY;
            monster.moving = true;
          } else {
            monster.turnTargetX = null;
            monster.turnTargetY = null;
            monster.moving = false;
            if (heroEngagement.hero === monster && heroEngagement.turn === 'hero') {
              handControlToPlayerDuringHeroEncounter();
            }
          }
          continue;
        }

        monster.moving = false;
      }
    }

    function getMonsterWalkFrame(monster) {
      if (!monster.moving) return GREEN_SLIME_IDLE_FRAME;
      return Math.floor(monster.animTime / GREEN_SLIME_FRAME_MS) % GREEN_SLIME_FRAMES;
    }

    function isMonsterTileWalkable(x, y, treeTiles, ignoreMonster = null, options = null) {
      const tile = tileAt(x, y);
      if (!tile) return false;
      if (tile === 'water') return false;
      if (treeTiles.has(keyOf(x, y))) return false;

      const isHeroMover = !!(ignoreMonster && ignoreMonster.type === 'heroWanderer');
      const blockPlayer = options && typeof options.blockPlayer === 'boolean'
        ? options.blockPlayer
        : !isHeroMover;
      const blockOtherMonsters = options && typeof options.blockOtherMonsters === 'boolean'
        ? options.blockOtherMonsters
        : !isHeroMover;

      if (blockPlayer) {
        const playerTile = getPlayerTile();
        if (playerTile.x === x && playerTile.y === y) return false;
      }

      if (chestState.placed) {
        const chestTile = getCurrentChestTile();
        if (chestTile.x === x && chestTile.y === y) {
          return false;
        }
      }

      if (blockOtherMonsters) {
        for (const monster of monsters) {
          if (monster === ignoreMonster) continue;
          if (Math.floor(monster.x) === x && Math.floor(monster.y) === y) return false;
        }
      }

      return true;
    }

    function getOffscreenSpawnCandidates(bounds, treeTiles) {
      const candidates = [];

      for (let y = bounds.minY - 1; y <= bounds.maxY + 1; y++) {
        for (let x = bounds.minX - 1; x <= bounds.maxX + 1; x++) {
          const isOffscreenRing =
            x === bounds.minX - 1 ||
            x === bounds.maxX + 1 ||
            y === bounds.minY - 1 ||
            y === bounds.maxY + 1;

          if (!isOffscreenRing) continue;
          if (tileAt(x, y) !== 'grass') continue;
          if (!isMonsterTileWalkable(x, y, treeTiles)) continue;

          const inwardX = Math.max(bounds.minX, Math.min(bounds.maxX, x));
          const inwardY = Math.max(bounds.minY, Math.min(bounds.maxY, y));

          const possibleDirs = [];
          const baseDirX = Math.sign(inwardX - x);
          const baseDirY = Math.sign(inwardY - y);

          if (baseDirX !== 0) possibleDirs.push({ dirX: baseDirX, dirY: 0 });
          if (baseDirY !== 0) possibleDirs.push({ dirX: 0, dirY: baseDirY });

          for (const dir of possibleDirs) {
            const stepX = x + dir.dirX;
            const stepY = y + dir.dirY;
            if (!isMonsterTileWalkable(stepX, stepY, treeTiles)) continue;
            candidates.push({ x, y, dirX: dir.dirX, dirY: dir.dirY, stepX, stepY });
          }
        }
      }

      return candidates;
    }

    function getMonsterAnchorDistance(monster) {
      return Math.hypot(monster.x - (monster.anchorX + 0.5), monster.y - (monster.anchorY + 0.5));
    }

    function hasMonsterReachedAnchor(monster) {
      return getMonsterAnchorDistance(monster) <= 0.20;
    }

    function getMonsterTile(monster) {
      return { x: Math.floor(monster.x), y: Math.floor(monster.y) };
    }

    function getSlimeHomeTileNearPlayer(playerTile, treeTiles, bounds) {
      const maxRadius = 4;
      for (let radius = 0; radius <= maxRadius; radius++) {
        for (let dy = -radius; dy <= radius; dy++) {
          for (let dx = -radius; dx <= radius; dx++) {
            if (Math.abs(dx) + Math.abs(dy) !== radius) continue;
            const x = playerTile.x + dx;
            const y = playerTile.y + dy;
            if (x < bounds.minX || x > bounds.maxX || y < bounds.minY || y > bounds.maxY) continue;
            if (!isMonsterTileWalkable(x, y, treeTiles)) continue;
            return { x, y };
          }
        }
      }
      return null;
    }

    function getMonsterPathBounds(bounds, startX, startY, goalX, goalY) {
      return {
        minX: Math.min(bounds.minX, startX, goalX) - 3,
        maxX: Math.max(bounds.maxX, startX, goalX) + 3,
        minY: Math.min(bounds.minY, startY, goalY) - 3,
        maxY: Math.max(bounds.maxY, startY, goalY) + 3,
      };
    }

    function findMonsterPath(startX, startY, goalX, goalY, treeTiles, bounds, ignoreMonster = null) {
      if (startX === goalX && startY === goalY) return [];

      const limits = getMonsterPathBounds(bounds, startX, startY, goalX, goalY);
      const startKey = keyOf(startX, startY);
      const goalKey = keyOf(goalX, goalY);
      const queue = [{ x: startX, y: startY }];
      const cameFrom = new Map();
      cameFrom.set(startKey, null);

      for (let i = 0; i < queue.length; i++) {
        const current = queue[i];
        const dirs = [
          { x: 1, y: 0 },
          { x: -1, y: 0 },
          { x: 0, y: 1 },
          { x: 0, y: -1 },
        ];

        for (const dir of dirs) {
          const nx = current.x + dir.x;
          const ny = current.y + dir.y;
          if (nx < limits.minX || nx > limits.maxX || ny < limits.minY || ny > limits.maxY) continue;
          const nextKey = keyOf(nx, ny);
          if (cameFrom.has(nextKey)) continue;
          if (!(nx === goalX && ny === goalY) && !isMonsterTileWalkable(nx, ny, treeTiles, ignoreMonster)) continue;
          cameFrom.set(nextKey, current);
          if (nextKey === goalKey) {
            const path = [];
            let step = { x: nx, y: ny };
            while (step) {
              path.push(step);
              const prev = cameFrom.get(keyOf(step.x, step.y));
              step = prev;
            }
            path.reverse();
            path.shift();
            return path;
          }
          queue.push({ x: nx, y: ny });
        }
      }

      return null;
    }

    function ensureMonsterPathToAnchor(monster, treeTiles, bounds) {
      const currentTile = getMonsterTile(monster);
      const path = findMonsterPath(currentTile.x, currentTile.y, monster.anchorX, monster.anchorY, treeTiles, bounds, monster);
      if (!path) {
        monster.pathTiles = [];
        monster.pathIndex = 0;
        return false;
      }
      monster.pathTiles = path;
      monster.pathIndex = 0;
      return true;
    }

    function advanceMonsterAlongPath(monster, dt, treeTiles, bounds) {
      if (hasMonsterReachedAnchor(monster)) return true;

      if (!monster.pathTiles || monster.pathIndex >= monster.pathTiles.length) {
        if (!ensureMonsterPathToAnchor(monster, treeTiles, bounds)) return false;
      }

      const nextTile = monster.pathTiles[monster.pathIndex];
      if (!nextTile) return false;

      if (!isMonsterTileWalkable(nextTile.x, nextTile.y, treeTiles, monster)) {
        if (!ensureMonsterPathToAnchor(monster, treeTiles, bounds)) return false;
      }

      const targetTile = monster.pathTiles[monster.pathIndex];
      if (!targetTile) return false;

      const targetX = targetTile.x + 0.5;
      const targetY = targetTile.y + 0.5;
      const dx = targetX - monster.x;
      const dy = targetY - monster.y;
      const dist = Math.hypot(dx, dy);

      if (dist <= 0.0001) {
        monster.x = targetX;
        monster.y = targetY;
        monster.pathIndex += 1;
        return hasMonsterReachedAnchor(monster);
      }

      const step = GREEN_SLIME_SPEED * dt;
      monster.moveDirX = Math.abs(dx) >= Math.abs(dy) ? Math.sign(dx) : 0;
      monster.moveDirY = monster.moveDirX === 0 ? Math.sign(dy) : 0;

      if (step >= dist) {
        monster.x = targetX;
        monster.y = targetY;
        monster.pathIndex += 1;
      } else {
        monster.x += (dx / dist) * step;
        monster.y += (dy / dist) * step;
      }

      return hasMonsterReachedAnchor(monster);
    }

    function trySpawnForestSlime(bounds, treeTiles, now) {
      if (monsters.some((m) => m.type === 'greenSlime')) return false;

      const biomeName = getCurrentBiome(bounds, treeTiles);
      if (biomeName !== 'Forest') return false;
      if (Math.random() > FOREST_SLIME_SPAWN_CHANCE) return false;

      const candidates = getOffscreenSpawnCandidates(bounds, treeTiles);
      if (!candidates.length) return false;

      const playerTile = getPlayerTile();
      const homeTile = getSlimeHomeTileNearPlayer(playerTile, treeTiles, bounds);
      if (!homeTile) return false;

      const reachableCandidates = [];
      for (const candidate of candidates) {
        const path = findMonsterPath(candidate.x, candidate.y, homeTile.x, homeTile.y, treeTiles, bounds, null);
        if (!path) continue;
        reachableCandidates.push({ candidate, path });
      }
      if (!reachableCandidates.length) return false;

      const chosenEntry = reachableCandidates[Math.floor(Math.random() * reachableCandidates.length)];
      const chosen = chosenEntry.candidate;

      monsters.push({
        type: 'greenSlime',
        x: chosen.x + 0.5,
        y: chosen.y + 0.5,
        anchorX: homeTile.x,
        anchorY: homeTile.y,
        entering: true,
        pathTiles: chosenEntry.path,
        pathIndex: 0,
        moveDirX: chosen.dirX,
        moveDirY: chosen.dirY,
        moveTimeLeft: 0.8 + Math.random() * 0.6,
        idleTimeLeft: 0,
        moving: true,
        animTime: 0,
        alertUntil: 0,
      });
      return true;
    }

    function updateMonsters(dt, now) {
      const bounds = getVisibleBounds();
      const treeTiles = getActiveTreeTiles(now);


      for (const monster of monsters) {
        if (monster.entering) {
          monster.moving = true;
          monster.animTime += dt * 1000;

          const reachedAnchor = advanceMonsterAlongPath(monster, dt, treeTiles, bounds);
          if (!monster.pathTiles?.length && !reachedAnchor) {
            monster.entering = false;
            monster.moving = false;
            monster.animTime = 0;
            monster.idleTimeLeft = 0.6 + Math.random() * 0.8;
            continue;
          }

          if (reachedAnchor) {
            monster.entering = false;
            monster.moving = false;
            monster.animTime = 0;
            monster.idleTimeLeft = 1.0 + Math.random() * 2.0;
          }

          continue;
        }

        if (monster.moveTimeLeft > 0) {
          monster.moveTimeLeft -= dt;
          monster.moving = true;
          monster.animTime += dt * 1000;

          const step = GREEN_SLIME_SPEED * dt;
          const nextX = monster.x + monster.moveDirX * step;
          const nextY = monster.y + monster.moveDirY * step;
          const nextDist = Math.hypot(nextX - (monster.anchorX + 0.5), nextY - (monster.anchorY + 0.5));
          const tx = Math.floor(nextX);
          const ty = Math.floor(nextY);

          if (nextDist <= GREEN_SLIME_WANDER_RADIUS && isMonsterTileWalkable(tx, ty, treeTiles, monster)) {
            monster.x = nextX;
            monster.y = nextY;
          } else {
            monster.moveTimeLeft = 0;
          }

          if (monster.moveTimeLeft <= 0) {
            monster.moving = false;
            monster.animTime = 0;
            monster.idleTimeLeft = 1.0 + Math.random() * 2.0;
          }

          continue;
        }

        monster.moving = false;
        monster.animTime = 0;
        monster.idleTimeLeft -= dt;

        if (monster.idleTimeLeft <= 0) {
          const dirs = [
            { x: 1, y: 0 },
            { x: -1, y: 0 },
            { x: 0, y: 1 },
            { x: 0, y: -1 },
          ];

          const validDirs = dirs.filter((dir) => {
            const testX = monster.x + dir.x;
            const testY = monster.y + dir.y;
            const testDist = Math.hypot(testX - (monster.anchorX + 0.5), testY - (monster.anchorY + 0.5));
            return testDist <= GREEN_SLIME_WANDER_RADIUS &&
              isMonsterTileWalkable(Math.floor(testX), Math.floor(testY), treeTiles, monster);
          });

          if (validDirs.length) {
            const dir = validDirs[Math.floor(Math.random() * validDirs.length)];
            monster.moveDirX = dir.x;
            monster.moveDirY = dir.y;
            monster.moveTimeLeft = 0.45 + Math.random() * 0.55;
          } else {
            monster.idleTimeLeft = 0.8 + Math.random() * 1.2;
          }
        }
      }
    }

    function drawChestInteractHighlight() {
      const target = getChestInteractTarget();
      if (!target) return;

      const screenX = camera.x + chestState.x * TILE_SIZE - TILE_SIZE / 2;
      const screenY = camera.y + chestState.y * TILE_SIZE - TILE_SIZE / 2 + PLAYER_DRAW_OFFSET_Y;

      ctx.save();
      ctx.strokeStyle = 'rgba(255, 230, 120, 0.95)';
      ctx.lineWidth = 3;
      ctx.strokeRect(screenX - 4, screenY - 4, TILE_SIZE + 8, TILE_SIZE + 8);
      ctx.fillStyle = 'rgba(255, 230, 120, 0.10)';
      ctx.fillRect(screenX - 4, screenY - 4, TILE_SIZE + 8, TILE_SIZE + 8);
      ctx.restore();
    }

    function drawSelectedTreeHighlight(now = performance.now()) {
      if (!player.selectedTreeKey) return;
      const target = getFacingTreeTarget(now);
      if (!target || target.key !== player.selectedTreeKey) return;
      const info = getTreeRenderInfo(target.x, target.y, getTreeAnimationProgress(target.key, now), target.key, 'normal', now);
      const boxX = info.baseScreenX + 10;
      const boxY = info.baseScreenY + 10;
      const boxW = TILE_SIZE - 20;
      const boxH = TILE_SIZE - 12;

      ctx.save();
      ctx.strokeStyle = 'rgba(255, 230, 120, 0.95)';
      ctx.lineWidth = 3;
      ctx.strokeRect(boxX, boxY, boxW, boxH);
      ctx.fillStyle = 'rgba(255, 230, 120, 0.08)';
      ctx.fillRect(boxX, boxY, boxW, boxH);
      ctx.restore();
    }

    function drawHeldTileTargetHighlight() {
      const target = getCurrentInteractionTarget();
      if (!target || (target.type !== 'tile' && target.type !== 'acorn')) return;

      const screenX = camera.x + target.x * TILE_SIZE;
      const screenY = camera.y + target.y * TILE_SIZE;
      ctx.strokeStyle = target.type === 'acorn' ? 'rgba(200, 170, 255, 0.95)' : 'rgba(156, 230, 255, 0.95)';
      ctx.lineWidth = 3;
      ctx.strokeRect(screenX + 8, screenY + 8, TILE_SIZE - 16, TILE_SIZE - 16);
      ctx.fillStyle = target.type === 'acorn' ? 'rgba(200, 170, 255, 0.14)' : 'rgba(156, 230, 255, 0.14)';
      ctx.fillRect(screenX + 8, screenY + 8, TILE_SIZE - 16, TILE_SIZE - 16);
    }

    function drawMonsters(now) {
      const interactionTarget = getCurrentInteractionTarget();
      const nearbyMonster = interactionTarget && interactionTarget.type === 'monster'
        ? interactionTarget.monster
        : null;

      const activeHero = isHeroEngagementActive() ? heroEngagement.hero : null;

      for (const monster of monsters) {
        if (activeHero && monster !== activeHero) continue;

        if (monster.type === 'greenSlime') {
          if (!loaded.greenSlime) continue;

          const frame = getMonsterWalkFrame(monster);
          const drawScale = 0.48;
          const drawW = Math.floor(TILE_SIZE * drawScale);
          const drawH = Math.floor(TILE_SIZE * drawScale);
          const screenX = Math.floor(camera.x + monster.x * TILE_SIZE - TILE_SIZE / 2);
          const screenY = Math.floor(camera.y + monster.y * TILE_SIZE - TILE_SIZE / 2 + PLAYER_DRAW_OFFSET_Y);
          const drawX = screenX + Math.floor((TILE_SIZE - drawW) / 2);
          const drawY = screenY - 4 + Math.floor((TILE_SIZE - drawH) / 2);

          if (monster === nearbyMonster) {
            ctx.save();
            ctx.strokeStyle = 'rgba(255, 230, 120, 0.95)';
            ctx.lineWidth = 3;
            ctx.strokeRect(drawX - 4, drawY - 4, drawW + 8, drawH + 8);
            ctx.fillStyle = 'rgba(255, 230, 120, 0.10)';
            ctx.fillRect(drawX - 4, drawY - 4, drawW + 8, drawH + 8);
            ctx.restore();
          }

          drawAnimatedStripFrame(
            assets.greenSlime,
            GREEN_SLIME_FRAMES,
            frame,
            drawX,
            drawY,
            drawW,
            drawH
          );

          if (monster.alertUntil && now < monster.alertUntil) {
            const bubbleW = 22;
            const bubbleH = 20;
            const bubbleX = drawX + Math.floor((drawW - bubbleW) / 2);
            const bubbleY = drawY - 18;

            ctx.save();
            ctx.fillStyle = 'rgba(255,255,255,0.95)';
            ctx.fillRect(bubbleX, bubbleY, bubbleW, bubbleH);
            ctx.strokeStyle = 'rgba(40,40,40,0.9)';
            ctx.lineWidth = 2;
            ctx.strokeRect(bubbleX + 0.5, bubbleY + 0.5, bubbleW - 1, bubbleH - 1);
            ctx.beginPath();
            ctx.moveTo(bubbleX + 8, bubbleY + bubbleH);
            ctx.lineTo(bubbleX + 11, bubbleY + bubbleH + 5);
            ctx.lineTo(bubbleX + 14, bubbleY + bubbleH);
            ctx.closePath();
            ctx.fillStyle = 'rgba(255,255,255,0.95)';
            ctx.fill();
            ctx.stroke();
            ctx.fillStyle = '#111';
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('!', bubbleX + bubbleW / 2, bubbleY + bubbleH / 2 + 1);
            ctx.restore();
          }

          continue;
        }

        if (monster.type === 'heroWanderer') {
          if (!loaded.heroWanderer) continue;

          const drawScale = 0.56;
          const drawW = Math.floor(TILE_SIZE * drawScale);
          const drawH = Math.floor(TILE_SIZE * drawScale);
          const screenX = Math.floor(camera.x + monster.x * TILE_SIZE - TILE_SIZE / 2);
          const screenY = Math.floor(camera.y + monster.y * TILE_SIZE - TILE_SIZE / 2 + PLAYER_DRAW_OFFSET_Y);
          const drawX = screenX + Math.floor((TILE_SIZE - drawW) / 2);
          const drawY = screenY - 6 + Math.floor((TILE_SIZE - drawH) / 2);

          if (monster === nearbyMonster) {
            ctx.save();
            ctx.strokeStyle = 'rgba(255, 230, 120, 0.95)';
            ctx.lineWidth = 3;
            ctx.strokeRect(drawX - 4, drawY - 4, drawW + 8, drawH + 8);
            ctx.fillStyle = 'rgba(255, 230, 120, 0.10)';
            ctx.fillRect(drawX - 4, drawY - 4, drawW + 8, drawH + 8);
            ctx.restore();
          }

          if (monster.mode === 'explore' || monster.mode === 'approach' || monster.mode === 'alert' || monster.mode === 'flee') {
            const labelW = 34;
            const labelH = 18;
            const labelX = drawX + Math.floor((drawW - labelW) / 2);
            const labelY = drawY - 20;
            ctx.save();
            ctx.fillStyle = 'rgba(0, 0, 0, 0.78)';
            ctx.fillRect(labelX, labelY, labelW, labelH);
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 1;
            ctx.strokeRect(labelX + 0.5, labelY + 0.5, labelW - 1, labelH - 1);
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            if (monster.mode === 'explore') {
              const cx = labelX + labelW / 2;
              const cy = labelY + labelH / 2 + 0.5;
              ctx.strokeStyle = '#f7f1d1';
              ctx.lineWidth = 1.5;
              ctx.beginPath();
              ctx.ellipse(cx, cy, 8, 5, 0, 0, Math.PI * 2);
              ctx.stroke();
              ctx.fillStyle = '#f7f1d1';
              ctx.beginPath();
              ctx.arc(cx, cy, 2.2, 0, Math.PI * 2);
              ctx.fill();
            } else if (monster.mode === 'approach') {
              const cx = labelX + labelW / 2;
              const cy = labelY + labelH / 2 + 0.5;
              ctx.strokeStyle = '#ffe29a';
              ctx.lineWidth = 1.5;
              ctx.beginPath();
              ctx.arc(cx - 4, cy - 2, 1.4, 0, Math.PI * 2);
              ctx.arc(cx + 4, cy - 2, 1.4, 0, Math.PI * 2);
              ctx.stroke();
              ctx.beginPath();
              ctx.arc(cx, cy + 0.5, 5.5, 0.18 * Math.PI, 0.82 * Math.PI, false);
              ctx.stroke();
            } else {
              ctx.fillStyle = '#fff1b3';
              ctx.font = 'bold 14px Arial';
              ctx.fillText('!', labelX + labelW / 2, labelY + labelH / 2 + 1);
            }
            ctx.restore();
          }

          const heroAnimFrames = 3;
          const heroAnimMs = 180;
          const heroFrame = monster.moving
            ? (Math.floor(now / heroAnimMs) % heroAnimFrames)
            : 0;
          const heroFlipX = !!(
            monster.facingX > 0 ||
            (monster.facingX === 0 && monster.facingY < 0)
          );
          drawSpriteFrameMirrored(
            assets.heroWanderer,
            heroAnimFrames,
            heroFrame,
            drawX,
            drawY,
            drawW,
            drawH,
            heroFlipX
          );
        }
      }
    }

    let environmentPausedAt = null;
    let environmentPausedDurationMs = 0;
    let pausedTreeTiles = null;

    function isEnvironmentPaused() {
      return player.form === 'chest';
    }

    function finalizeTreeVisualState(now) {
      const bounds = getActiveSimulationBounds();
      const treeTiles = getActiveTreeTiles(now);
      for (const [key, state] of treeState.entries()) {
        const [x, y] = key.split(',').map(Number);
        if (!isWithinBounds(x, y, bounds)) continue;
        state.bornAt = now - TREE_GROW_MS;
        if (state.pendingReveal) state.pendingReveal = false;
      }
      for (const key of [...removingTrees.keys()]) {
        const [x, y] = key.split(',').map(Number);
        if (isWithinBounds(x, y, bounds)) {
          removingTrees.delete(key);
        }
      }
      return treeTiles;
    }

    function pauseEnvironment(now = performance.now()) {
      if (environmentPausedAt != null) return;
      const environmentNow = getEnvironmentNow(now);
      environmentPausedAt = now;
      pausedTreeTiles = finalizeTreeVisualState(environmentNow);
    }

    function resumeEnvironment(now = performance.now()) {
      if (environmentPausedAt == null) return;
      environmentPausedDurationMs += now - environmentPausedAt;
      environmentPausedAt = null;
      pausedTreeTiles = null;
    }

    function getEnvironmentNow(now = performance.now()) {
      const activePauseMs = environmentPausedAt != null ? (now - environmentPausedAt) : 0;
      return now - environmentPausedDurationMs - activePauseMs;
    }

    function getVisibleBounds() {
      const minX = Math.floor((-camera.x) / TILE_SIZE) - 1;
      const maxX = Math.ceil((canvas.width - camera.x) / TILE_SIZE) + 1;
      const minY = Math.floor((-camera.y) / TILE_SIZE) - 1;
      const maxY = Math.ceil((canvas.height - camera.y) / TILE_SIZE) + 1;
      return { minX, maxX, minY, maxY };
    }

    function render(now = performance.now()) {
      const environmentNow = getEnvironmentNow(now);
      updateCamera();
      updateRemovingTrees(environmentNow);
      refreshSelectedTree(environmentNow);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawVoidBackground(now);

      const bounds = getVisibleBounds();
      if (!pausedTreeTiles) {
        tryAmbientTreeGrowth(now);
      }
      const treeTiles = getActiveTreeTiles(now);
      const biomeName = getCurrentBiome(bounds, treeTiles);

      for (let y = bounds.minY; y <= bounds.maxY; y++) {
        for (let x = bounds.minX; x <= bounds.maxX; x++) {
          const tile = tileAt(x, y);
          if (!tile) continue;
          const screenX = camera.x + x * TILE_SIZE;
          const screenY = camera.y + y * TILE_SIZE;
          drawTileTop(tile, x, y, screenX, screenY, now, getTilePlacementProgress(keyOf(x, y), now));
        }
      }

      drawPlantedAcorns(bounds, now);

      for (let y = bounds.minY; y <= bounds.maxY; y++) {
        for (let x = bounds.minX; x <= bounds.maxX; x++) {
          const tileKey = keyOf(x, y);
          if (treeTiles.has(tileKey)) {
            drawTreeBottomAtTile(x, y, getTreeAnimationProgress(tileKey, environmentNow), 'normal', environmentNow);
          } else if (removingTrees.has(tileKey)) {
            drawTreeBottomAtTile(x, y, 1, 'fade', environmentNow);
          }
        }
      }

      drawLooseAcorns(bounds, now);

      for (let y = bounds.minY; y <= bounds.maxY; y++) {
        for (let x = bounds.minX; x <= bounds.maxX; x++) {
          const tile = tileAt(x, y);
          if (!tile) continue;
          if (hasTile(x, y + 1)) continue;
          const screenX = camera.x + x * TILE_SIZE;
          const screenY = camera.y + y * TILE_SIZE;
          drawTileEdge(tile, screenX, screenY, now, getTilePlacementProgress(keyOf(x, y), now));
        }
      }

      drawHeroEngagementGrid(bounds);
      drawHeroVisionHighlights();
      drawHeroCameraInspectHighlight();
      drawHeroActionTargetHighlights();
      drawChestInteractHighlight();
      drawSelectedTreeHighlight(now);
      drawHeldTileTargetHighlight();

      drawPlayerReflection(bounds, now);
      drawChestObject();
      drawMonsters(now);
      drawPlayer(now);
      drawCollectedAcornEffects(now);
      drawFloatingTexts(now);

      for (let y = bounds.minY; y <= bounds.maxY; y++) {
        for (let x = bounds.minX; x <= bounds.maxX; x++) {
          const tileKey = keyOf(x, y);
          if (treeTiles.has(tileKey)) {
            drawTreeTopAtTile(x, y, getTreeAnimationProgress(tileKey, environmentNow), 'normal', environmentNow);
          } else if (removingTrees.has(tileKey)) {
            drawTreeTopAtTile(x, y, 1, 'fade', environmentNow);
          }
        }
      }
      drawSelectedTreePrompt(environmentNow);
      drawBiomeLabel(biomeName);
      drawEncounterBanner(now);
      drawTurnHint();
      drawHeroActionMenu();
      drawHeroAmbushUi();
      drawHeroEngagementFade(now);

      const playerTile = getPlayerTile();
      const formLabel = player.form;
      const handText = player.form === 'shadow' && player.heldTile ? ` · Holding: ${player.heldTile}` : '';
      const acornText = ` · Acorns: ${player.acornCount || 0}`;
      const visibleStats = getVisibleBiomeStats(bounds, treeTiles);
      const treePct = visibleStats.validTreeTiles > 0 ? Math.round((visibleStats.treeCount / visibleStats.validTreeTiles) * 100) : 0;
      posLabel.textContent = `Form: ${formLabel} · Tile: ${playerTile.x}, ${playerTile.y}${handText}`;
      if (camInfoLabel) {
        camInfoLabel.textContent = `Valid: ${visibleStats.validTreeTiles} · Dirt: ${visibleStats.dirtTiles} · Grass: ${visibleStats.grassTiles} · Water: ${visibleStats.waterTiles} · Trees: ${visibleStats.treeCount} · Tree%: ${treePct}%`;
      }
      updateSlimeInfoLabel();
      syncItemBarUi();
    }

    function isWalkablePoint(tileSpaceX, tileSpaceY, ignoreTrees = false) {
      const tx = Math.floor(tileSpaceX);
      const ty = Math.floor(tileSpaceY);
      const tile = tileAt(tx, ty);
      if (!tile) return false;
      if (tile === 'water') return false;
      if (!ignoreTrees && getActiveTreeTiles(performance.now()).has(keyOf(tx, ty))) return false;
      return true;
    }

    function isWalkableBody(centerX, centerY, ignoreTrees = false) {
      const samplePoints = [
        [centerX - PLAYER_RADIUS, centerY - PLAYER_RADIUS],
        [centerX + PLAYER_RADIUS, centerY - PLAYER_RADIUS],
        [centerX - PLAYER_RADIUS, centerY + PLAYER_RADIUS],
        [centerX + PLAYER_RADIUS, centerY + PLAYER_RADIUS],
        [centerX, centerY - PLAYER_RADIUS],
        [centerX, centerY + PLAYER_RADIUS],
        [centerX - PLAYER_RADIUS, centerY],
        [centerX + PLAYER_RADIUS, centerY],
      ];

      return samplePoints.every(([x, y]) => isWalkablePoint(x, y, ignoreTrees));
    }

    function clearChestMoveTarget() {
      player.chestMoveTargetX = null;
      player.chestMoveTargetY = null;
      player.chestMoveStartX = null;
      player.chestMoveStartY = null;
    }

    function hasChestMoveTarget() {
      return player.chestMoveTargetX != null && player.chestMoveTargetY != null;
    }

    function updateChestGridMovement(dt, rawMoveX, rawMoveY) {
      if (isHeroEngagementActive() && heroEngagement.turn !== 'player') {
        player.moving = false;
        player.animTime = 0;
        return;
      }

      if (hasChestMoveTarget()) {
        const dx = player.chestMoveTargetX - player.x;
        const dy = player.chestMoveTargetY - player.y;
        const dist = Math.hypot(dx, dy);
        const step = CHEST_SPEED * dt;

        if (dist <= step || dist <= 0.0001) {
          const now = performance.now();
          const fromTile = {
            x: Math.floor(player.chestMoveStartX != null ? player.chestMoveStartX : player.x),
            y: Math.floor(player.chestMoveStartY != null ? player.chestMoveStartY : player.y),
          };
          player.x = player.chestMoveTargetX;
          player.y = player.chestMoveTargetY;
          const toTile = { x: Math.floor(player.x), y: Math.floor(player.y) };
          clearChestMoveTarget();
          if (isHeroEngagementActive() && heroEngagement.turn === 'player') {
            if (maybeTriggerHeroVisionReactionOnPlayerMove(fromTile, toTile, now)) {
              // Hero saw the chest move and is fleeing.
            } else if (!startHeroAmbush(now)) {
              endMountedPlayerTurn(now);
            }
          } else if (!isHeroEngagementActive()) {
            incrementWorldTurn();
            trySpawnMountedHeroEncounter(now);
          }
        } else {
          player.x += (dx / dist) * step;
          player.y += (dy / dist) * step;
        }

        player.moving = true;
        player.animTime += dt * 1000;
        return;
      }

      if (rawMoveX === 0 && rawMoveY === 0) {
        player.moving = false;
        player.animTime = 0;
        return;
      }

      let stepX = 0;
      let stepY = 0;
      if (Math.abs(rawMoveX) >= Math.abs(rawMoveY)) {
        stepX = Math.sign(rawMoveX);
      } else {
        stepY = Math.sign(rawMoveY);
      }

      if (stepX < 0) player.facing = 'west';
      else if (stepX > 0) player.facing = 'east';
      else if (stepY < 0) player.facing = 'north';
      else if (stepY > 0) player.facing = 'south';

      if (stepX > 0) player.facingX = 1;
      else if (stepX < 0) player.facingX = -1;

      const startX = Math.floor(player.x) + 0.5;
      const startY = Math.floor(player.y) + 0.5;
      player.x = startX;
      player.y = startY;

      const targetX = startX + stepX;
      const targetY = startY + stepY;
      if (!isWalkableBody(targetX, targetY)) {
        player.moving = false;
        player.animTime = 0;
        return;
      }

      player.chestMoveStartX = startX;
      player.chestMoveStartY = startY;
      player.chestMoveTargetX = targetX;
      player.chestMoveTargetY = targetY;
      player.moving = true;
      player.animTime += dt * 1000;
    }

    function updateHeroCameraPan(dt) {
      if (!isHeroEngagementActive()) return;
      if (heroEngagement.turn !== 'player' || heroEngagement.mode !== 'camera') return;
      // Camera movement is handled as tile-by-tile key presses in keydown.
    }

    function updatePlayer(dt) {
      let moveX = 0;
      let moveY = 0;

      if (input.left) moveX -= 1;
      if (input.right) moveX += 1;
      if (input.up) moveY -= 1;
      if (input.down) moveY += 1;

      const rawMoveX = moveX;
      const rawMoveY = moveY;

      if (player.form === 'chest') {
        if (isHeroEngagementActive() && heroEngagement.turn !== 'player') {
          player.moving = false;
          player.animTime = 0;
          return;
        }
        if (shouldAutoOpenMountedMenu()) {
          openMountedActionMenu();
          player.moving = false;
          player.animTime = 0;
          return;
        }
        if (!mountedMenu.open && !isChestHidden()) {
          updateChestGridMovement(dt, rawMoveX, rawMoveY);
        } else {
          player.moving = false;
          player.animTime = 0;
        }
        return;
      }

      if (moveX === 0 && moveY === 0) {
        player.moving = false;
        player.animTime = 0;
        return;
      }

      if (Math.abs(rawMoveX) >= Math.abs(rawMoveY)) {
        if (rawMoveX < 0) player.facing = 'west';
        else if (rawMoveX > 0) player.facing = 'east';
      } else {
        if (rawMoveY < 0) player.facing = 'north';
        else if (rawMoveY > 0) player.facing = 'south';
      }

      const length = Math.hypot(moveX, moveY);
      moveX /= length;
      moveY /= length;

      player.moving = true;
      player.animTime += dt * 1000;

      if (rawMoveX > 0) player.facingX = 1;
      else if (rawMoveX < 0) player.facingX = -1;

      const step = SHADOW_SPEED * dt;
      const nextX = player.x + moveX * step;
      const nextY = player.y + moveY * step;
      if (isWalkableBody(nextX, player.y)) {
        player.x = nextX;
      }
      if (isWalkableBody(player.x, nextY)) {
        player.y = nextY;
      }
      collectLooseAcornUnderPlayer(performance.now());
    }

    function lockHeldMovementUntilRelease() {
      movementReleaseGate.up = !!input.up;
      movementReleaseGate.down = !!input.down;
      movementReleaseGate.left = !!input.left;
      movementReleaseGate.right = !!input.right;
      input.up = false;
      input.down = false;
      input.left = false;
      input.right = false;
    }

    function mountChest() {
      closeMountedActionMenu();
      const target = getChestInteractTarget();
      if (!target) return;
      const startShadowX = player.x;
      const startShadowY = player.y;
      clearRecallCharge();
      lockHeldMovementUntilRelease();
      pauseEnvironment();
      chestPossessTransition.active = false;
      player.form = 'chest';
      player.hiddenInChest = false;
      player.x = chestState.x;
